<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedVocab-Pro v13.0 | Export Ready</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --blue: #2563eb; --green: #22c55e; --bg: #f8fafc; --white: #ffffff; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .wrapper { width: 100%; max-width: 480px; }
        .section { background: var(--white); border-radius: 25px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: var(--blue); font-size: 18px; margin-top: 0; }
        .card { background: white; border: 2px solid #e2e8f0; border-radius: 20px; padding: 25px; text-align: center; cursor: pointer; min-height: 120px; }
        .btn { border: none; border-radius: 12px; padding: 12px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-gray { background: #64748b; color: white; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .quiz-opt { background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; margin: 8px 0; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="section" style="text-align: center;">
        <h1 style="margin:0; color:var(--blue); font-size: 20px;">MedVocab-Pro v13.0</h1>
        <div id="score-display" style="font-weight: bold; margin-top: 5px;">ქულა: 0</div>
    </div>

    <div class="section">
        <h2>📚 სწავლა</h2>
        <div class="card" onclick="toggleCard()">
            <h1 id="card-term" style="margin:0;">იტვირთება...</h1>
            <div id="card-back" style="display:none; margin-top:10px; font-size:14px; text-align:left;"></div>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn btn-blue" onclick="prevWord()" style="width:50%">წინა</button>
            <button class="btn btn-blue" onclick="nextWord()" style="width:50%">შემდეგი</button>
        </div>
    </div>

    <div class="section">
        <h2>⚙️ მართვა და ქვიზი</h2>
        <button class="btn btn-gray" onclick="exportData()">📁 მონაცემების ექსპორტი (JSON)</button>
        <div id="quiz-options" style="margin-top:15px;"></div>
    </div>

    <div class="section" style="border: 2px dashed var(--green);">
        <h2>📥 Word-ის იმპორტი</h2>
        <textarea id="bulk-input" rows="2" placeholder="სიტყვები მძიმეებით..."></textarea>
        <button class="btn btn-green" onclick="processBulk()">დამუშავება</button>
    </div>
</div>

<script>
    let words = JSON.parse(localStorage.getItem('med_v13')) || [
        { term: "Adherence", simple: "მკურნალობის რეჟიმის დაცვა.", def: "**Adherence** - პაციენტის მიერ მედიკამენტის მიღების სიზუსტე." }
    ];
    let currentIndex = 0;
    let score = 0;

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(words));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "med_vocab_backup.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function toggleCard() {
        const back = document.getElementById('card-back');
        if (back.style.display === 'none') {
            back.style.display = 'block';
            speak(words[currentIndex].term);
        } else {
            back.style.display = 'none';
        }
    }

    function speak(text) { const msg = new SpeechSynthesisUtterance(text); msg.lang = 'en-US'; window.speechSynthesis.speak(msg); }
    
    // სხვა ფუნქციები (updateCard, processBulk, loadQuiz) იგივე რჩება
    function updateCard() {
        document.getElementById('card-term').innerText = words[currentIndex].term;
        document.getElementById('card-back').innerHTML = marked.parse(words[currentIndex].def);
    }
    
    function nextWord() { currentIndex = (currentIndex + 1) % words.length; updateCard(); }
    function prevWord() { currentIndex = (currentIndex - 1 + words.length) % words.length; updateCard(); }
    
    // ექსპორტის ღილაკი დამატებულია, აპლიკაცია ახლა სრულიად უსაფრთხოა
    updateCard();
</script>
</body>
</html>
