<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedVocab-Pro | სამედიცინო ინგლისური</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap');
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: default; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .nav-btn { cursor: pointer; transition: 0.2s; color: #64748b; }
        .active-nav { color: #2563eb; border-bottom: 2px solid #2563eb; }
        .speak-btn { cursor: pointer; transition: 0.2s; }
        .speak-btn:hover { color: #2563eb; transform: scale(1.1); }
    </style>
</head>
<body class="pb-24">

    <header class="bg-blue-600 text-white p-5 shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-3">
                <i class="fas fa-stethoscope text-2xl"></i> MedVocab-Pro
            </h1>
            <span id="wordCount" class="bg-blue-700/50 backdrop-blur px-4 py-1 rounded-full text-sm font-medium border border-blue-400/30">
                0 ტერმინი
            </span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 mt-4">
        
        <section id="studySection" class="space-y-4">
            <div id="wordList" class="grid gap-5 md:grid-cols-1">
                </div>
        </section>

        <section id="quizSection" class="hidden text-center space-y-6 py-10">
            <div id="quizContent">
                <div class="text-7xl mb-6">🧬</div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">თვითშემოწმება</h2>
                <p id="quizError" class="text-slate-500 bg-slate-100 p-4 rounded-2xl inline-block">
                    გთხოვთ დაამატოთ მინიმუმ 2 ტერმინი ქვიზის დასაწყებად.
                </p>
                <button onclick="startQuiz()" id="startQuizBtn" class="hidden bg-blue-600 text-white px-10 py-4 rounded-2xl font-bold hover:bg-blue-700 transition shadow-xl active:scale-95">
                    ქვიზის დაწყება
                </button>
            </div>
            <div id="activeQuiz" class="hidden bg-white p-10 rounded-[2rem] shadow-2xl border border-blue-50 max-w-md mx-auto">
                <p class="text-xs text-blue-500 font-black mb-3 uppercase tracking-[0.2em]">აირჩიეთ სწორი თარგმანი</p>
                <h3 id="questionWord" class="text-4xl font-black text-slate-800 mb-10 tracking-tight"></h3>
                <div id="options" class="grid gap-4"></div>
            </div>
        </section>

        <section id="addSection" class="hidden max-w-md mx-auto bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-50">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl">
                    <i class="fas fa-magic"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">AI გენერატორი</h2>
                <p class="text-slate-400 text-sm mt-1">შეიყვანეთ ინგლისური ტერმინი</p>
            </div>

            <div class="space-y-5">
                <input type="text" id="newWord" placeholder="მაგ: Bioavailability" 
                       class="w-full p-5 bg-slate-50 border-2 border-transparent rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all text-lg font-medium">
                
                <button id="aiBtn" onclick="handleAIAdd()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 flex justify-center items-center gap-3 transition-all active:scale-95">
                    <span id="btnText">გენერირება</span>
                    <i id="spinner" class="fas fa-circle-notch fa-spin hidden"></i>
                </button>
                
                <p id="aiStatus" class="text-sm text-center font-medium min-h-[1.25rem]"></p>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/80 backdrop-blur-xl border border-slate-200/50 p-3 rounded-3xl shadow-2xl flex gap-8 items-center z-50 px-10">
        <div onclick="showSection('study')" class="nav-btn flex flex-col items-center active-nav" id="nav-study">
            <i class="fas fa-layer-group text-xl"></i>
            <span class="text-[10px] mt-1 font-bold uppercase tracking-tighter">ბაზა</span>
        </div>
        <div onclick="showSection('add')" class="nav-btn flex flex-col items-center" id="nav-add">
            <div class="w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-lg shadow-blue-200 mb-1 -mt-8 border-4 border-white">
                <i class="fas fa-plus text-lg"></i>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-tighter">დამატება</span>
        </div>
        <div onclick="showSection('quiz')" class="nav-btn flex flex-col items-center" id="nav-quiz">
            <i class="fas fa-vial text-xl"></i>
            <span class="text-[10px] mt-1 font-bold uppercase tracking-tighter">ქვიზი</span>
        </div>
    </nav>

    <script>
        // 1. მონაცემების მართვა
        let words = JSON.parse(localStorage.getItem('medWords')) || [];

        // 2. გახმოვანების ფუნქცია (Text-to-Speech)
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // წინა ხმის გაჩერება
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US';
                msg.rate = 0.9;
                window.speechSynthesis.speak(msg);
            } else {
                alert("თქვენს ბრაუზერს არ აქვს გახმოვანების მხარდაჭერა.");
            }
        }

        // 3. ნავიგაცია
        function showSection(section) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            
            document.getElementById(section + 'Section').classList.remove('hidden');
            const navItem = document.getElementById('nav-' + section);
            if(navItem) navItem.classList.add('active-nav');
            
            if(section === 'study') renderList();
            if(section === 'quiz') checkQuizStatus();
        }

        // 4. სიის გამოტანა
        function renderList() {
            const list = document.getElementById('wordList');
            document.getElementById('wordCount').innerText = `${words.length} ტერმინი`;
            
            if (words.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-20 text-slate-400">
                        <i class="fas fa-folder-open text-5xl mb-4 block"></i>
                        ბაზა ცარიელია. დაამატეთ ახალი სიტყვა.
                    </div>`;
                return;
            }

            list.innerHTML = words.map((w, index) => `
                <div class="card bg-white p-7 rounded-[2rem] shadow-sm border border-slate-100 relative group">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-3">
                                <h3 class="text-2xl font-black text-slate-800 tracking-tight">${w.english}</h3>
                                <button onclick="speak('${w.english}')" class="speak-btn text-blue-400">
                                    <i class="fas fa-volume-up"></i>
                                </button>
                            </div>
                            <p class="text-sm font-mono text-blue-500 font-bold mt-1 bg-blue-50 inline-block px-2 rounded-md tracking-widest">${w.ipa || '/.../'}</p>
                        </div>
                        <button onclick="deleteWord(${index})" class="text-slate-200 hover:text-red-500 transition-colors p-2">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                    
                    <div class="mt-4">
                        <p class="text-lg font-bold text-slate-700">${w.georgian}</p>
                    </div>

                    <div class="mt-5 pt-5 border-t border-slate-50">
                        <p class="text-sm text-slate-500 leading-relaxed"><b class="text-slate-700">Def:</b> ${w.definition}</p>
                        <p class="text-xs text-blue-600 mt-3 font-semibold bg-blue-50/50 p-3 rounded-xl italic">
                            <i class="fas fa-quote-left mr-2 opacity-50"></i>${w.example || 'მაგალითი არ არის.'}
                        </p>
                    </div>
                </div>
            `).reverse().join('');
        }

        // 5. AI დამატების ლოგიკა
        async function handleAIAdd() {
            const input = document.getElementById('newWord');
            const word = input.value.trim();
            const status = document.getElementById('aiStatus');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');

            if (!word) return;

            // Loading State
            status.innerText = "AI აანალიზებს ტერმინს...";
            status.className = "text-sm text-center font-medium text-blue-500";
            btnText.innerText = "მუშავდება...";
            spinner.classList.remove('hidden');
            document.getElementById('aiBtn').disabled = true;

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ word: word })
                });

                if (!response.ok) throw new Error("სერვერმა უარი თქვა. შეამოწმეთ API Key.");

                const data = await response.json();
                
                words.push({
                    english: word,
                    georgian: data.georgian,
                    ipa: data.ipa || '',
                    definition: data.definition,
                    example: data.example || ''
                });

                saveData();
                input.value = "";
                status.innerText = "✅ წარმატებით დაემატა!";
                status.className = "text-sm text-center font-medium text-green-500";
                
                setTimeout(() => showSection('study'), 1200);

            } catch (err) {
                status.innerText = "❌ შეცდომა: " + err.message;
                status.className = "text-sm text-center font-medium text-red-500";
            } finally {
                btnText.innerText = "გენერირება";
                spinner.classList.add('hidden');
                document.getElementById('aiBtn').disabled = false;
            }
        }

        // 6. დამხმარე ფუნქციები
        function deleteWord(index) {
            if(confirm('წავშალოთ ეს ტერმინი?')) {
                words.splice(words.length - 1 - index, 1);
                saveData();
                renderList();
            }
        }

        function saveData() {
            localStorage.setItem('medWords', JSON.stringify(words));
        }

        // 7. ქვიზის ლოგიკა
        function checkQuizStatus() {
            const error = document.getElementById('quizError');
            const btn = document.getElementById('startQuizBtn');
            const active = document.getElementById('activeQuiz');
            
            active.classList.add('hidden');
            if (words.length >= 2) {
                error.classList.add('hidden');
                btn.classList.remove('hidden');
            } else {
                error.classList.remove('hidden');
                btn.classList.add('hidden');
            }
        }

        function startQuiz() {
            document.getElementById('quizContent').classList.add('hidden');
            document.getElementById('activeQuiz').classList.remove('hidden');
            nextQuestion();
        }

        function nextQuestion() {
            const correct = words[Math.floor(Math.random() * words.length)];
            let options = [correct.georgian];
            
            while(options.length < 3 && words.length >= 3) {
                const rand = words[Math.floor(Math.random() * words.length)].georgian;
                if(!options.includes(rand)) options.push(rand);
            }
            options.sort(() => Math.random() - 0.5);

            document.getElementById('questionWord').innerText = correct.english;
            const container = document.getElementById('options');
            container.innerHTML = options.map(opt => `
                <button onclick="checkAnswer('${opt}', '${correct.georgian}')" 
                        class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold hover:border-blue-500 hover:bg-blue-50 transition-all active:scale-95 text-slate-700">
                    ${opt}
                </button>
            `).join('');
        }

        function checkAnswer(sel, cor) {
            if(sel === cor) {
                const container = document.getElementById('activeQuiz');
                container.classList.add('ring-4', 'ring-green-400');
                setTimeout(() => {
                    container.classList.remove('ring-4', 'ring-green-400');
                    nextQuestion();
                }, 600);
            } else {
                alert('არასწორია, სცადეთ ისევ! 💡');
            }
        }

        // პირველი ჩატვირთვა
        window.onload = () => {
            renderList();
        };
    </script>
</body>
</html>
