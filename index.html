<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedVocab-Pro v15.0 | Advanced Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --blue: #2563eb; --green: #22c55e; --bg: #f1f5f9; --white: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* ჰედერი და მენიუ */
        header { background: var(--blue); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .menu-dropdown { position: relative; display: inline-block; }
        .menu-content { display: none; position: absolute; right: 0; background: white; min-width: 160px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); border-radius: 10px; z-index: 101; }
        .menu-content a { color: #333; padding: 12px 16px; text-decoration: none; display: block; border-bottom: 1px solid #eee; }
        .show { display: block; }

        /* საძიებო სისტემა */
        .search-bar { padding: 10px; background: white; border-bottom: 1px solid #ddd; }
        #search-input { width: 90%; padding: 10px; border-radius: 20px; border: 1px solid #ccc; display: block; margin: 0 auto; }

        .wrapper { padding: 15px; max-width: 500px; margin: 0 auto; }
        .section { background: var(--white); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* ფლეშქარდი */
        .card { perspective: 1000px; height: 250px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; border: 2px solid #e2e8f0; padding: 20px; box-sizing: border-box; background: white; }
        .card-back { transform: rotateY(180deg); background: #f0f7ff; text-align: left; align-items: flex-start; }

        .level-badge { background: #fee2e2; color: #ef4444; padding: 4px 8px; border-radius: 10px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .ipa { color: #64748b; font-style: italic; margin-bottom: 15px; }
        .example { border-left: 3px solid var(--blue); padding-left: 10px; margin-top: 10px; font-style: italic; color: #475569; }

        .btn { border: none; border-radius: 12px; padding: 12px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-green { background: var(--green); color: white; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">MedVocab-Pro v15.0</div>
    <div class="menu-dropdown">
        <span onclick="toggleMenu()" style="font-size: 24px; cursor: pointer;">⋮</span>
        <div id="myDropdown" class="menu-content">
            <a href="#" onclick="showSection('study')">📚 სწავლა</a>
            <a href="#" onclick="showSection('quiz')">📝 ქვიზი</a>
            <a href="#" onclick="showSection('admin')">➕ დამატება</a>
            <a href="#" onclick="exportData()">📁 ექსპორტი</a>
        </div>
    </div>
</header>

<div class="search-bar">
    <input type="text" id="search-input" placeholder="მოძებნეთ ტერმინი..." onkeyup="searchWords()">
</div>

<div class="wrapper">
    <div id="sec-study" class="section">
        <div class="card" onclick="this.querySelector('.card-inner').classList.toggle('flipped'); speakTerm()">
            <div class="card-inner">
                <div class="card-front">
                    <span id="f-level" class="level-badge">C1</span>
                    <h1 id="f-term" style="margin:0;">Adherence</h1>
                    <span id="f-ipa" class="ipa">/ədˈhɪərəns/</span>
                    <small style="color:#94a3b8;">🔊 დააჭირეთ გადასაბრუნებლად</small>
                </div>
                <div class="card-back">
                    <strong>მნიშვნელობა:</strong>
                    <div id="b-def">მკურნალობის რეჟიმის დაცვა.</div>
                    <div class="example">
                        <strong>მაგალითი:</strong>
                        <div id="b-ex">"Strict adherence to the dosage is critical."</div>
                    </div>
                </div>
            </div>
        </div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn btn-nav" onclick="prevWord()">⬅️</button>
            <button class="btn btn-nav" onclick="nextWord()">➡️</button>
        </div>
    </div>

    <div id="sec-quiz" class="section" style="display:none;">
        <h2 id="q-term">...</h2>
        <div id="q-options"></div>
        <div id="q-feedback" style="margin-top:10px; font-weight:bold; text-align:center;"></div>
    </div>

    <div id="sec-admin" class="section" style="display:none;">
        <h2>➕ ახალი ტერმინი</h2>
        <input type="text" id="in-term" placeholder="ტერმინი (მაგ: Potency)">
        <input type="text" id="in-ipa" placeholder="ტრანსკრიპცია (მაგ: /ˈpoʊtnsi/)">
        <select id="in-level" style="width:100%; padding:10px; border-radius:10px; margin:5px 0;">
            <option value="B2">B2</option>
            <option value="C1">C1</option>
            <option value="C2" selected>C2</option>
        </select>
        <textarea id="in-def" placeholder="განმარტება"></textarea>
        <textarea id="in-ex" placeholder="მაგალითი წინადადებაში"></textarea>
        <button class="btn btn-green" onclick="addNewWord()">ბაზაში დამატება</button>
    </div>
</div>

<script>
    let words = JSON.parse(localStorage.getItem('med_v15')) || [
        { term: "Adherence", ipa: "/ədˈhɪərəns/", level: "C1", def: "მკურნალობის რეჟიმის დაცვა.", ex: "Strict adherence to the dosage is critical." }
    ];
    let idx = 0;

    function toggleMenu() { document.getElementById("myDropdown").classList.toggle("show"); }

    function showSection(s) {
        ['sec-study', 'sec-quiz', 'sec-admin'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('sec-' + s).style.display = 'block';
        toggleMenu();
        if(s === 'quiz') loadQuiz();
    }

    function updateCard() {
        const w = words[idx];
        document.getElementById('f-term').innerText = w.term;
        document.getElementById('f-ipa').innerText = w.ipa;
        document.getElementById('f-level').innerText = w.level;
        document.getElementById('b-def').innerText = w.def;
        document.getElementById('b-ex').innerText = w.ex;
    }

    function nextWord() { idx = (idx + 1) % words.length; updateCard(); }
    function prevWord() { idx = (idx - 1 + words.length) % words.length; updateCard(); }

    function speakTerm() {
        const msg = new SpeechSynthesisUtterance(words[idx].term);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function addNewWord() {
        const newW = {
            term: document.getElementById('in-term').value,
            ipa: document.getElementById('in-ipa').value,
            level: document.getElementById('in-level').value,
            def: document.getElementById('in-def').value,
            ex: document.getElementById('in-ex').value
        };
        words.push(newW);
        localStorage.setItem('med_v15', JSON.stringify(words));
        alert("დაემატა!");
        location.reload();
    }

    function searchWords() {
        let input = document.getElementById('search-input').value.toLowerCase();
        let found = words.findIndex(w => w.term.toLowerCase().includes(input));
        if(found !== -1) { idx = found; updateCard(); }
    }

    function loadQuiz() {
        const correct = words[Math.floor(Math.random() * words.length)];
        document.getElementById('q-term').innerText = `რა არის "${correct.term}"?`;
        let opts = [correct.def];
        while(opts.length < 3) {
            let r = words[Math.floor(Math.random() * words.length)].def;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);
        const cont = document.getElementById('q-options');
        cont.innerHTML = '';
        opts.forEach(o => {
            const d = document.createElement('div');
            d.style = "padding:12px; border:1px solid #ddd; margin:5px; border-radius:10px; cursor:pointer;";
            d.innerText = o;
            d.onclick = () => {
                const feed = document.getElementById('q-feedback');
                if(o === correct.def) {
                    feed.innerText = "✅ სწორია!"; feed.style.color = "green";
                    setTimeout(loadQuiz, 1000);
                } else {
                    feed.innerText = "❌ არასწორია, სცადეთ თავიდან"; feed.style.color = "red";
                }
            };
            cont.appendChild(d);
        });
    }

    updateCard();
</script>
</body>
</html>
