<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>MedVocab-Pro v11.0 | Ultimate Bulk</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--primary); color: white; cursor: pointer; margin-top: 5px; }
        .bulk-area { background: #f0fdf4; border: 2px dashed #22c55e; padding: 15px; margin-bottom: 20px; border-radius: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>MedVocab-Pro v11.0</h1>
    
    <div class="bulk-area">
        <h3>📥 სწრაფი იმპორტი</h3>
        <textarea id="bulk-input" rows="3" placeholder="ჩასვით სიტყვები მძიმეებით (მაგ: Adherence, Clearance, Potency)"></textarea>
        <button style="background: #22c55e;" onclick="bulkImport()">სიტყვების დამუშავება</button>
    </div>

    <hr>

    <h3>➕ ხელით დამატება</h3>
    <input type="text" id="manual-term" placeholder="ტერმინი">
    <button onclick="manualAdd()">დამატება</button>

    <p id="status" style="text-align:center; color: var(--primary);"></p>
</div>

<script>
    let words = JSON.parse(localStorage.getItem('med_v11')) || [];

    // ავტომატური დამუშავება
    async function bulkImport() {
        const text = document.getElementById('bulk-input').value;
        const list = text.split(',').map(s => s.trim()).filter(s => s !== "");
        document.getElementById('status').innerText = "მიმდინარეობს დამუშავება...";

        for (let term of list) {
            try {
                const resp = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${term}`);
                const data = await resp.json();
                
                if(data[0]) {
                    words.push({
                        term: term,
                        simple: data[0].meanings[0].definitions[0].definition.substring(0, 50),
                        def: data[0].meanings[0].definitions[0].definition
                    });
                }
            } catch(e) { console.error("ვერ მოიძებნა: " + term); }
        }
        localStorage.setItem('med_v11', JSON.stringify(words));
        document.getElementById('status').innerText = "წარმატებით დამუშავდა " + list.length + " სიტყვა!";
    }

    // ხელით დამატება
    function manualAdd() {
        const term = document.getElementById('manual-term').value;
        words.push({ term: term, simple: "ხელით დამატებული", def: "განმარტება საჭიროებს რედაქტირებას" });
        localStorage.setItem('med_v11', JSON.stringify(words));
        alert("დამატებულია!");
    }
</script>
</body>
</html>
