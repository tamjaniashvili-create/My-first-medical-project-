<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedVocab Pro</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5806/5806362.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans">
    <div class="max-w-md mx-auto">
        <header class="text-center py-6">
            <h1 class="text-3xl font-bold text-blue-700 uppercase tracking-tight">MedVocab Pro</h1>
            <p class="text-slate-500 italic text-sm font-medium">IELTS & Clinical English Mastery</p>
        </header>

        <div id="quiz-card" class="mb-8 bg-blue-600 p-6 rounded-3xl text-white shadow-xl transition-all border-b-4 border-blue-800">
            <h3 class="font-bold mb-1 text-blue-200 uppercase text-xs tracking-widest">Daily Quiz</h3>
            <p id="quiz-question" class="text-xl mb-6 font-medium leading-tight pt-2 italic">Loading...</p>
            <div id="quiz-options" class="grid grid-cols-1 gap-3"></div>
            
            <div id="quiz-footer" class="mt-6 hidden border-t border-white/10 pt-6">
                <div id="quiz-feedback" class="text-center p-3 rounded-2xl font-bold mb-4"></div>
                <button onclick="loadNextQuestion()" class="w-full bg-white text-blue-600 font-bold p-4 rounded-2xl shadow-lg active:scale-95 transition-all">
                    შემდეგი კითხვა ➔
                </button>
            </div>
        </div>

        <h3 class="font-bold text-slate-400 mb-4 px-2 uppercase text-[10px] tracking-widest text-center">Vocabulary Bank (30 New Words)</h3>
        <div id="vocab-list" class="space-y-3 pb-10"></div>
    </div>

    <script>
        const medicalWords = [
            { w: "Adherence", t: "/ədˈhɪərəns/", g: "დაცვა, ერთგულება" },
            { w: "Precision", t: "/prɪˈsɪʒən/", g: "სიზუსტე" },
            { w: "Refractory", t: "/rɪˈfræktəri/", g: "რეზისტენტული" },
            { w: "Ambiguity", t: "/ˌæmbɪˈɡjuːɪti/", g: "ორაზროვნება" },
            { w: "Subsequent", t: "/ˈsʌbsɪkwənt/", g: "მომდევნო" },
            { w: "Counteract", t: "/ˌkaʊntərˈækt/", g: "წინააღმდეგ მოქმედება" },
            { w: "Prevalence", t: "/ˈprevələns/", g: "გავრცელება" },
            { w: "Delineate", t: "/dɪˈlɪnieɪt/", g: "გამოკვეთა, აღწერა" },
            { w: "Deviation", t: "/ˌdiːviˈeɪʃən/", g: "გადახრა" },
            { w: "Precursor", t: "/priˈkɜːrsər/", g: "წინამორბედი" },
            { w: "Discrepancy", t: "/dɪˈskrepənsi/", g: "შეუსაბამობა" },
            { w: "Compliance", t: "/kəmˈplaɪəns/", g: "შესაბამისობა, დამორჩილება" },
            { w: "Implementation", t: "/ˌɪmplɪmenˈteɪʃən/", g: "განხორციელება" },
            { w: "Congestion", t: "/kənˈdʒestʃən/", g: "შეშუპება, გადატვირთვა" },
            { w: "Regurgitation", t: "/rɪˌɡɜːrdʒɪˈteɪʃən/", g: "რეგურგიტაცია" },
            { w: "Distension", t: "/dɪˈstenʃən/", g: "გაბერვა" },
            { w: "Contractility", t: "/ˌkɒntrækˈtɪləti/", g: "შეკუმშვის უნარი" },
            { w: "Garbled", t: "/ˈɡɑːrbld/", g: "გაუგებარი" },
            { w: "Tote", t: "/toʊt/", g: "ტარება" },
            { w: "Deft", t: "/deft/", g: "მოხერხებული" },
            { w: "Boorish", t: "/ˈbʊərɪʃ/", g: "უზრდელი" },
            { w: "Fractious", t: "/ˈfrækʃəs/", g: "კონფლიქტური" },
            { w: "Putative", t: "/ˈpjuːtətɪv/", g: "სავარაუდო" },
            { w: "Nadir", t: "/neɪˈdɪər/", g: "ყველაზე დაბალი წერტილი" },
            { w: "Hector", t: "/ˈhektər/", g: "დამუქრება, ზეწოლა" },
            { w: "Besotted", t: "/bɪˈsɒtɪd/", g: "ძლიერ გატაცებული" },
            { w: "Gambit", t: "/ˈɡæmbɪt/", g: "გათვლილი ნაბიჯი" },
            { w: "Immure", t: "/ɪˈmjʊər/", g: "გამოკეტვა" },
            { w: "Rash", t: "/ræʃ/", g: "დაუფიქრებელი" },
            { w: "Tranche", t: "/trɑːnʃ/", g: "ნაწილი" }
        ];

        function initApp() {
            const list = document.getElementById('vocab-list');
            list.innerHTML = '';
            medicalWords.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center";
                card.innerHTML = `<div><h4 class="font-bold text-slate-800 text-lg">${item.w}</h4><p class="text-blue-500 text-xs font-mono">${item.t}</p><p class="text-slate-600 mt-1">${item.g}</p></div><button onclick="playVoice('${item.w}')" class="text-xl p-3 bg-slate-50 rounded-full">🔊</button>`;
                list.appendChild(card);
            });
            loadNextQuestion();
        }

        function loadNextQuestion() {
            const current = medicalWords[Math.floor(Math.random() * medicalWords.length)];
            document.getElementById('quiz-question').innerText = `What does "${current.w}" mean?`;
            document.getElementById('quiz-footer').classList.add('hidden');
            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = '';
            
            let choices = [...medicalWords].sort(() => 0.5 - Math.random()).slice(0, 3);
            if (!choices.find(c => c.w === current.w)) choices[0] = current;
            choices.sort(() => 0.5 - Math.random());

            choices.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "bg-white/10 hover:bg-white/20 p-4 rounded-2xl text-left border border-white/10 font-medium transition-all";
                btn.innerText = opt.g;
                btn.onclick = () => {
                    const foot = document.getElementById('quiz-footer');
                    const feed = document.getElementById('quiz-feedback');
                    foot.classList.remove('hidden');
                    if(opt.w === current.w) {
                        feed.innerText = "✅ სწორია!";
                        feed.className = "text-center p-3 rounded-2xl font-bold mb-4 bg-green-500/20 text-green-300 border border-green-500/30";
                    } else {
                        feed.innerText = `❌ სწორია: ${current.g}`;
                        feed.className = "text-center p-3 rounded-2xl font-bold mb-4 bg-red-500/20 text-red-300 border border-red-500/30";
                    }
                };
                optionsDiv.appendChild(btn);
            });
        }

        function playVoice(t) {
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'en-US';
            window.speechSynthesis.speak(m);
        }

        initApp();
    </script>
</body>
</html>
