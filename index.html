<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedVocab-Pro v9.0 | Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --white: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--text); }
        
        .header { background: var(--white); width: 100%; max-width: 450px; padding: 20px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        .score-box { font-size: 22px; font-weight: bold; color: var(--primary); margin: 10px 0; background: #eff6ff; padding: 10px; border-radius: 15px; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 10px; width: 100%; max-width: 450px; }
        .tabs button { flex: 1; padding: 12px; border-radius: 15px; border: none; cursor: pointer; background: #f1f5f9; transition: 0.3s; font-weight: 600; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .tabs button.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }

        /* სწავლის ბარათი */
        .card-container { perspective: 1000px; width: 100%; max-width: 450px; height: 350px; margin-top: 10px; }
        .card { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--white); border-radius: 35px; padding: 30px; border: 1px solid #e2e8f0; box-sizing: border-box; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .back { transform: rotateY(180deg); background: #f0f9ff; text-align: left; align-items: flex-start; overflow-y: auto; display: block; }

        /* სექციები */
        .panel { display: none; width: 100%; max-width: 450px; animation: fadeIn 0.3s ease; }
        .active-panel { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ფორმები და ღილაკები */
        .admin-form { background: var(--white); padding: 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        input, textarea { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #e2e8f0; border-radius: 15px; font-size: 15px; outline: none; box-sizing: border-box; transition: 0.2s; }
        input:focus { border-color: var(--primary); }
        
        .btn-action { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 18px; width: 100%; cursor: pointer; font-weight: 600; font-size: 16px; transition: 0.2s; margin-top: 10px; }
        .btn-action:active { transform: scale(0.98); }
        
        .option-btn { width: 100%; text-align: left; padding: 18px; margin: 10px 0; border: 1.5px solid #e2e8f0; border-radius: 18px; background: white; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .option-btn:hover { border-color: var(--primary); background: #f8fafc; }
        
        .nav-btns { display: flex; gap: 15px; width: 100%; max-width: 450px; margin-top: 20px; }
        .btn-nav { flex: 1; padding: 15px; border-radius: 18px; border: none; font-weight: 600; cursor: pointer; background: #e2e8f0; color: #475569; }
        .btn-next { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; color:var(--primary); font-size:24px; letter-spacing:-0.5px;">MEDVOCAB-PRO v9.0</h1>
    <div class="score-box" id="score-display">ქულა: 0</div>
    <div class="tabs">
        <button onclick="switchTab('study')" id="tab-study" class="active">📚 სწავლა</button>
        <button onclick="switchTab('quiz')" id="tab-quiz">📝 ქვიზი</button>
        <button onclick="switchTab('admin')" id="tab-admin">➕ დამატება</button>
    </div>
</div>

<div id="section-study" class="panel active-panel">
    <div class="card-container">
        <div class="card" id="main-card" onclick="this.classList.toggle('flipped')">
            <div class="front">
                <h2 id="display-term" style="color:var(--primary); font-size:30px; margin-bottom:10px;">...</h2>
                <button style="background:#eff6ff; border:none; font-size:32px; cursor:pointer; border-radius:50%; width:70px; height:70px;" onclick="event.stopPropagation(); speakCurrent()">🔊</button>
                <p style="font-size:12px; color:#94a3b8; margin-top:40px;">დააჭირეთ გადასაბრუნებლად</p>
            </div>
            <div id="display-def" class="back">...</div>
        </div>
    </div>
    <div class="nav-btns">
        <button onclick="prevWord()" class="btn-nav">წინა</button>
        <button onclick="nextWord()" class="btn-nav btn-next">შემდეგი</button>
    </div>
</div>

<div id="section-quiz" class="panel">
    <div class="admin-form">
        <h3 id="quiz-question" style="margin-top:0; color:var(--text); line-height:1.4;">...</h3>
        <div id="quiz-options"></div>
        <p id="quiz-feedback" style="text-align:center; font-weight:bold; margin-top:20px; min-height:24px;"></p>
    </div>
</div>

<div id="section-admin" class="panel">
    <div class="admin-form">
        <h3 style="margin-top:0;">➕ ახალი ტერმინი</h3>
        <input type="text" id="new-term" placeholder="ტერმინი (მაგ: Bioavailability)">
        <input type="text" id="new-simple" placeholder="მოკლე პასუხი ქვიზისთვის">
        <textarea id="new-def" rows="4" placeholder="სრული განმარტება (შეგიძლიათ გამოიყენოთ Markdown)"></textarea>
        <button class="btn-action" onclick="addNewWord()">ბაზაში შენახვა</button>
    </div>
</div>

<script>
    // მონაცემების ჩატვირთვა (ლოკალური ან საწყისი)
    let words = JSON.parse(localStorage.getItem('medPro_v9')) || [
        { term: "Adherence", simple: "მკურნალობის რეჟიმის დაცვა.", def: "**Adherence** არის პაციენტის მიერ მედიკამენტების მიღების რეჟიმის ზუსტი შესრულება." },
        { term: "Clearance", simple: "ორგანიზმის გაწმენდის უნარი.", def: "**Clearance** განსაზღვრავს ორგანიზმის უნარს, სითხე გაწმინდოს წამლისგან." },
        { term: "Therapeutic Index", simple: "წამლის უსაფრთხოების მაჩვენებელი.", def: "**TI** არის თანაფარდობა ტოქსიკურ და ეფექტურ დოზებს შორის." }
    ];

    let currentIndex = 0;
    let score = 0;

    function switchTab(tab) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.getElementById('section-' + tab).classList.add('active-panel');
        
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        
        if(tab === 'quiz') loadQuiz();
        if(tab === 'study') updateCard();
    }

    function updateCard() {
        if(words.length === 0) return;
        const card = document.getElementById('main-card');
        card.classList.remove('flipped');
        document.getElementById('display-term').innerText = words[currentIndex].term;
        document.getElementById('display-def').innerHTML = marked.parse(words[currentIndex].def);
    }

    function nextWord() { currentIndex = (currentIndex + 1) % words.length; updateCard(); }
    function prevWord() { currentIndex = (currentIndex - 1 + words.length) % words.length; updateCard(); }

    function speakCurrent() {
        const msg = new SpeechSynthesisUtterance(words[currentIndex].term);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function addNewWord() {
        const term = document.getElementById('new-term').value.trim();
        const simple = document.getElementById('new-simple').value.trim();
        const def = document.getElementById('new-def').value.trim();

        if(term && simple && def) {
            words.push({ term, simple, def });
            localStorage.setItem('medPro_v9', JSON.stringify(words));
            alert("✅ ტერმინი წარმატებით დაემატა!");
            // გასუფთავება
            document.getElementById('new-term').value = '';
            document.getElementById('new-simple').value = '';
            document.getElementById('new-def').value = '';
            switchTab('study');
        } else {
            alert("❌ გთხოვთ შეავსოთ ყველა ველი!");
        }
    }

    function loadQuiz() {
        if(words.length < 2) {
            document.getElementById('quiz-question').innerText = "ქვიზისთვის დაამატეთ მინიმუმ 2 სიტყვა.";
            document.getElementById('quiz-options').innerHTML = '';
            return;
        }
        const correctWord = words[Math.floor(Math.random() * words.length)];
        document.getElementById('quiz-question').innerText = `რა არის "${correctWord.term}"-ის სწორი განმარტება?`;
        document.getElementById('quiz-feedback').innerText = '';
        
        let options = [correctWord.simple];
        while(options.length < 3) {
            let rand = words[Math.floor(Math.random() * words.length)].simple;
            if(!options.includes(rand)) options.push(rand);
        }
        options.sort(() => Math.random() - 0.5);

        const optionsDiv = document.getElementById('quiz-options');
        optionsDiv.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                if(opt === correctWord.simple) {
                    score += 10;
                    document.getElementById('score-display').innerText = `ქულა: ${score}`;
                    document.getElementById('quiz-feedback').innerText = "✅ ბრწყინვალეა!";
                    document.getElementById('quiz-feedback').style.color = "#10b981";
                    setTimeout(loadQuiz, 1200);
                } else {
                    document.getElementById('quiz-feedback').innerText = "❌ სცადეთ სხვა პასუხი";
                    document.getElementById('quiz-feedback').style.color = "#ef4444";
                }
            };
            optionsDiv.appendChild(btn);
        });
    }

    // ინიციალიზაცია
    updateCard();
</script>
</body>
</html>
