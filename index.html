<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedVocab Pro - Flashcards</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5806/5806362.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flip-card { perspective: 1000px; min-height: 160px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 1.5rem; padding: 1.25rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); display: flex; flex-direction: column; justify-content: center; }
        .flip-card-front { background: white; border: 1px solid #e2e8f0; }
        .flip-card-back { background: #f8fafc; transform: rotateY(180deg); border: 2px solid #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans">
    <div class="max-w-md mx-auto">
        <header class="text-center py-6">
            <h1 class="text-3xl font-bold text-blue-700 uppercase tracking-tight">MedVocab Pro</h1>
            <p class="text-slate-500 italic text-sm font-medium">Advanced Flashcards (30 Words)</p>
        </header>

        <div id="quiz-card" class="mb-8 bg-blue-600 p-6 rounded-3xl text-white shadow-xl border-b-4 border-blue-800">
            <h3 class="font-bold mb-1 text-blue-200 uppercase text-[10px] tracking-widest">Daily Quiz</h3>
            <p id="quiz-question" class="text-lg mb-6 font-medium leading-tight pt-2 italic">Loading...</p>
            <div id="quiz-options" class="grid grid-cols-1 gap-3"></div>
            <div id="quiz-footer" class="mt-6 hidden border-t border-white/10 pt-6">
                <div id="quiz-feedback" class="text-center p-3 rounded-2xl font-bold mb-4 text-sm"></div>
                <button onclick="loadNextQuestion()" class="w-full bg-white text-blue-600 font-bold p-4 rounded-2xl shadow-lg active:scale-95 transition-all">Next Question ➔</button>
            </div>
        </div>

        <h3 class="font-bold text-slate-400 mb-4 px-2 uppercase text-[10px] tracking-widest text-center">Vocabulary Bank (Tap to Flip)</h3>
        <div id="vocab-list" class="space-y-4 pb-20"></div>
    </div>

    <script>
        const medicalWords = [
            { w: "Adherence", t: "/ədˈhɪərəns/", type: "n. (C2)", g: "დაცვა, ერთგულება", syn: "compliance, fidelity", ex: "Strict adherence to guidelines improves outcomes." },
            { w: "Precision", t: "/prɪˈsɪʒən/", type: "n. (C1)", g: "სიზუსტე", syn: "accuracy, exactness", ex: "The procedure requires high precision." },
            { w: "Refractory", t: "/rɪˈfræktəri/", type: "adj. (C2)", g: "რეზისტენტული", syn: "resistant, stubborn", ex: "The condition proved refractory to treatment." },
            { w: "Ambiguity", t: "/ˌæmbɪˈɡjuːɪti/", type: "n. (C1)", g: "ორაზროვნება", syn: "uncertainty, vagueness", ex: "The statement created ambiguity." },
            { w: "Subsequent", t: "/ˈsʌbsɪkwənt/", type: "adj. (C1)", g: "მომდევნო", syn: "following, ensuing", ex: "Subsequent tests confirmed the diagnosis." },
            { w: "Counteract", t: "/ˌkaʊntərˈækt/", type: "v. (C1)", g: "წინააღმდეგ მოქმედება", syn: "neutralize, offset", ex: "The drug helps counteract inflammation." },
            { w: "Prevalence", t: "/ˈprevələns/", type: "n. (C1)", g: "გავრცელება", syn: "ubiquity, frequency", ex: "The prevalence of diabetes is increasing." },
            { w: "Delineate", t: "/dɪˈlɪnieɪt/", type: "v. (C2)", g: "გამოკვეთა, აღწერა", syn: "outline, define", ex: "The study delineates key risk factors." },
            { w: "Deviation", t: "/ˌdiːviˈeɪʃən/", type: "n. (C1)", g: "გადახრა", syn: "variation, divergence", ex: "Any deviation from protocol must be reported." },
            { w: "Precursor", t: "/priˈkɜːrsər/", type: "n. (C2)", g: "წინამორბედი", syn: "forerunner, antecedent", ex: "Fatigue can be a precursor to illness." },
            { w: "Discrepancy", t: "/dɪˈskrepənsi/", type: "n. (C1)", g: "შეუსაბამობა", syn: "inconsistency, mismatch", ex: "There is a discrepancy in the data." },
            { w: "Compliance", t: "/kəmˈplaɪəns/", type: "n. (C1)", g: "შესაბამისობა", syn: "adherence, conformity", ex: "Patient compliance affects treatment success." },
            { w: "Implementation", t: "/ˌɪmplɪmenˈteɪʃən/", type: "n. (C1)", g: "განხორციელება", syn: "execution, application", ex: "Implementation of the plan started today." },
            { w: "Congestion", t: "/kənˈdʒestʃən/", type: "n. (C1)", g: "შეშუპება", syn: "blockage, crowding", ex: "Nasal congestion caused discomfort." },
            { w: "Regurgitation", t: "/rɪˌɡɜːrdʒɪˈteɪʃən/", type: "n. (Med)", g: "რეგურგიტაცია", syn: "backflow, reflux", ex: "The patient reported acid regurgitation." },
            { w: "Distension", t: "/dɪˈstenʃən/", type: "n. (C1)", g: "გაბერვა", syn: "swelling, expansion", ex: "Abdominal distension was observed." },
            { w: "Contractility", t: "/ˌkɒntrækˈtɪləti/", type: "n. (C2)", g: "შეკუმშვის უნარი", syn: "constriction power", ex: "Cardiac contractility decreased." },
            { w: "Garbled", t: "/ˈɡɑːrbld/", type: "adj. (C1)", g: "გაუგებარი", syn: "distorted, jumbled", ex: "The message sounded garbled." },
            { w: "Tote", t: "/toʊt/", type: "v. (Inf)", g: "ტარება", syn: "carry, lug", ex: "She totes her bag everywhere." },
            { w: "Deft", t: "/deft/", type: "adj. (C2)", g: "მოხერხებული", syn: "skilful, adept", ex: "He made a deft move." },
            { w: "Boorish", t: "/ˈbʊərɪʃ/", type: "adj. (C2)", g: "უზრდელი", syn: "rude, uncouth", ex: "His boorish behavior upset others." },
            { w: "Fractious", t: "/ˈfrækʃəs/", type: "adj. (C2)", g: "კონფლიქტური", syn: "irritable, unruly", ex: "The group became fractious." },
            { w: "Putative", t: "/ˈpjuːtətɪv/", type: "adj. (C2)", g: "სავარაუდო", syn: "supposed, assumed", ex: "The putative cause remains unclear." },
            { w: "Nadir", t: "/ˈneɪdɪər/", type: "n. (C2)", g: "დაბალი წერტილი", syn: "bottom, zero", ex: "This marked the nadir of his career." },
            { w: "Hector", t: "/ˈhektər/", type: "v. (C2)", g: "ზეწოლა", syn: "bully, intimidate", ex: "He tried to hector his colleagues." },
            { w: "Besotted", t: "/bɪˈsɒtɪd/", type: "adj. (C2)", g: "გატაცებული", syn: "infatuated, smitten", ex: "He became besotted with her." },
            { w: "Gambit", t: "/ˈɡæmbɪt/", type: "n. (C2)", g: "გათვლილი ნაბიჯი", syn: "stratagem, scheme", ex: "It was a risky gambit." },
            { w: "Immure", t: "/ɪˈmjʊər/", type: "v. (C2)", g: "გამოკეტვა", syn: "confine, enclose", ex: "The prisoner was immured for years." },
            { w: "Rash", t: "/ræʃ/", type: "adj. (C1)", g: "დაუფიქრებელი", syn: "reckless, impetuous", ex: "He made a rash decision." },
            { w: "Tranche", t: "/trɑːnʃ/", type: "n. (C1)", g: "ნაწილი", syn: "portion, slice", ex: "Funds were released in a tranche." }
        ];

        function initApp() {
            const list = document.getElementById('vocab-list');
            list.innerHTML = '';
            medicalWords.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "flip-card";
                card.innerHTML = `
                    <div class="flip-card-inner" onclick="this.parentElement.classList.toggle('flipped')">
                        <div class="flip-card-front">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h4 class="font-bold text-slate-800 text-lg">${item.w} <span class="text-[10px] text-blue-400 font-normal ml-1">${item.type}</span></h4>
                                    <p class="text-blue-500 text-[11px] font-mono">${item.t}</p>
                                    <p class="text-slate-700 text-sm mt-2 font-medium">${item.g}</p>
                                    <p class="text-[9px] text-slate-400 mt-2 italic">Syn: ${item.syn}</p>
                                </div>
                                <button onclick="event.stopPropagation(); playVoice('${item.w}')" class="text-lg p-2 bg-slate-50 rounded-full hover:bg-blue-50">🔊</button>
                            </div>
                        </div>
                        <div class="flip-card-back">
                            <p class="text-[10px] font-bold text-blue-600 uppercase mb-1">Example:</p>
                            <p class="text-[13px] text-slate-800 italic leading-snug">"${item.ex}"</p>
                        </div>
                    </div>`;
                list.appendChild(card);
            });
            loadNextQuestion();
        }

        function loadNextQuestion() {
            const current = medicalWords[Math.floor(Math.random() * medicalWords.length)];
            document.getElementById('quiz-question').innerText = `What is the meaning of "${current.w}"?`;
            document.getElementById('quiz-footer').classList.add('hidden');
            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = '';
            let choices = [...medicalWords].sort(() => 0.5 - Math.random()).slice(0, 3);
            if (!choices.find(c => c.w === current.w)) choices[0] = current;
            choices.sort(() => 0.5 - Math.random());
            choices.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "bg-white/10 hover:bg-white/20 p-4 rounded-2xl text-left border border-white/10 text-sm font-medium transition-all";
                btn.innerText = opt.g;
                btn.onclick = () => {
                    const foot = document.getElementById('quiz-footer');
                    const feed = document.getElementById('quiz-feedback');
                    foot.classList.remove('hidden');
                    if(opt.w === current.w) {
                        feed.innerText = "✅ Correct!";
                        feed.className = "text-center p-3 rounded-2xl font-bold mb-4 bg-green-500/20 text-green-300 border border-green-500/30 text-sm";
                    } else {
                        feed.innerText = `❌ Correct: ${current.g}`;
                        feed.className = "text-center p-3 rounded-2xl font-bold mb-4 bg-red-500/20 text-red-300 border border-red-500/30 text-sm";
                    }
                };
                optionsDiv.appendChild(btn);
            });
        }

        function playVoice(t) {
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'en-US';
            window.speechSynthesis.speak(m);
        }

        initApp();
    </script>
</body>
</html>
