<title>MedVocab-Pro v19.0</title>

<style>
:root {
  --blue: #1d4ed8;
  --blue-light: #dbeafe;
  --green: #16a34a;
  --green-light: #dcfce7;
  --red: #dc2626;
  --red-light: #fee2e2;
  --amber: #d97706;
  --amber-light: #fef3c7;
  --purple: #7c3aed;
  --purple-light: #ede9fe;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --radius: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* ===== HEADER ===== */
header {
  background: var(--blue);
  color: white;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: 0 2px 12px rgba(29,78,216,0.3);
}
.header-title { font-family: 'DM Serif Display', serif; font-size: 20px; letter-spacing: 0.3px; }
.header-sub { font-size: 11px; opacity: 0.75; margin-top: 1px; }
.menu-btn { background: rgba(255,255,255,0.15); border: none; color: white; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }

/* ===== DROPDOWN MENU ===== */
.dropdown { position: absolute; right: 12px; top: 64px; background: white; min-width: 190px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: none; overflow: hidden; z-index: 2000; }
.dropdown.show { display: block; animation: slideDown 0.2s ease; }
.dropdown a { display: flex; align-items: center; gap: 10px; padding: 14px 18px; color: var(--text); text-decoration: none; font-weight: 500; font-size: 15px; border-bottom: 1px solid var(--border); transition: background 0.15s; cursor: pointer; }
.dropdown a:last-child { border-bottom: none; }
.dropdown a:hover, .dropdown a.active-nav { background: var(--blue-light); color: var(--blue); }
@keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

/* ===== PAGES ===== */
.container { padding: 20px 16px 100px; }
.page { display: none; animation: fadeIn 0.3s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: white;
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 999;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 4px 12px;
  cursor: pointer;
  color: var(--muted);
  font-size: 11px;
  font-weight: 500;
  gap: 4px;
  border: none;
  background: none;
  transition: color 0.2s;
}
.nav-item .nav-icon { font-size: 22px; }
.nav-item.active { color: var(--blue); }

/* ===== STUDY PAGE ===== */
.progress-bar-wrap { background: var(--border); border-radius: 99px; height: 6px; margin-bottom: 16px; }
.progress-bar-fill { height: 6px; border-radius: 99px; background: linear-gradient(90deg, var(--blue), #60a5fa); transition: width 0.4s ease; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; }

.card-box { perspective: 1200px; height: 320px; cursor: pointer; margin-bottom: 20px; }
.card-inner { width: 100%; height: 100%; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); transform-style: preserve-3d; position: relative; }
.card-inner.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: var(--radius); padding: 28px 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--card); box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
.card-back { transform: rotateY(180deg); align-items: flex-start; justify-content: flex-start; padding-top: 24px; background: #fafbff; }

.level-badge { padding: 4px 14px; border-radius: 99px; font-size: 12px; font-weight: 700; margin-bottom: 14px; }
.badge-b1 { background: var(--green-light); color: var(--green); }
.badge-b2 { background: var(--blue-light); color: var(--blue); }
.badge-c1 { background: var(--amber-light); color: var(--amber); }
.badge-c2 { background: var(--red-light); color: var(--red); }
.badge-med { background: var(--purple-light); color: var(--purple); }

.card-term { font-family: 'DM Serif Display', serif; font-size: 38px; color: var(--text); text-align: center; line-height: 1.1; }
.card-ipa { color: var(--muted); font-size: 15px; margin-top: 8px; letter-spacing: 0.5px; }
.speak-btn { margin-top: 16px; background: var(--blue-light); color: var(--blue); border: none; border-radius: 99px; padding: 8px 20px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.flip-hint { font-size: 11px; color: var(--muted); margin-top: 12px; opacity: 0.7; }

.back-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--blue); text-transform: uppercase; margin-bottom: 6px; }
.back-section { width: 100%; margin-bottom: 16px; }
.back-def { font-size: 16px; line-height: 1.5; color: var(--text); }
.back-ex { font-size: 14px; font-style: italic; color: var(--muted); line-height: 1.5; }
.back-geo { font-size: 14px; color: var(--green); font-weight: 500; }
.divider { width: 100%; height: 1px; background: var(--border); margin: 8px 0 16px; }

.nav-btns { display: flex; gap: 12px; }
.btn { flex: 1; padding: 14px; border-radius: 16px; border: 2px solid var(--border); background: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--blue); color: white; border-color: var(--blue); }
.btn-success { background: var(--green); color: white; border-color: var(--green); }
.btn-danger { background: var(--red); color: white; border-color: var(--red); }

/* ===== QUIZ PAGE ===== */
.quiz-card { background: white; border-radius: var(--radius); padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
.quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.quiz-score { font-size: 13px; font-weight: 700; color: var(--blue); background: var(--blue-light); padding: 4px 12px; border-radius: 99px; }
.quiz-question { font-family: 'DM Serif Display', serif; font-size: 22px; line-height: 1.3; margin-bottom: 20px; color: var(--text); }
.quiz-term-highlight { color: var(--blue); }
.quiz-opt {
  padding: 16px 18px; border: 2px solid var(--border); margin-bottom: 10px; border-radius: 14px;
  cursor: pointer; background: white; font-size: 14px; line-height: 1.4; transition: all 0.15s;
  text-align: left; width: 100%; font-family: 'DM Sans', sans-serif;
}
.quiz-opt:active { transform: scale(0.99); }
.quiz-opt.correct { border-color: var(--green); background: var(--green-light); color: var(--green); pointer-events: none; }
.quiz-opt.wrong { border-color: var(--red); background: var(--red-light); color: var(--red); pointer-events: none; }
.quiz-opt.disabled { pointer-events: none; opacity: 0.55; }
.quiz-feedback { text-align: center; padding: 12px; border-radius: 12px; margin-top: 8px; font-weight: 600; font-size: 15px; }
.quiz-feedback.ok { background: var(--green-light); color: var(--green); }
.quiz-feedback.fail { background: var(--red-light); color: var(--red); }
.btn-next-q { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 16px; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 14px; display: none; font-family: 'DM Sans', sans-serif; }
.btn-next-q:active { opacity: 0.85; }

.quiz-type-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.quiz-tab { flex: 1; padding: 9px 4px; border-radius: 12px; border: 2px solid var(--border); background: white; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.15s; }
.quiz-tab.active { border-color: var(--blue); background: var(--blue); color: white; }

/* ===== ADD PAGE ===== */
.add-card { background: white; border-radius: var(--radius); padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
.add-card h3 { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 6px; }
.add-card p { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
.field-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; display: block; }

/* API Key section */
.api-key-section { background: var(--amber-light); border-radius: 12px; padding: 14px 16px; margin-bottom: 18px; border: 1px solid #fcd34d; }
.api-key-section p { font-size: 12px; color: var(--amber); margin-bottom: 8px; font-weight: 600; }
.api-key-row { display: flex; gap: 8px; align-items: center; }
.api-key-row input { margin-bottom: 0; font-size: 13px; flex: 1; }
.btn-save-key { background: var(--amber); color: white; border: none; border-radius: 10px; padding: 10px 14px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }

function checkAnswer(btn, chosen, correct, container) {
  const allOpts = container.querySelectorAll('.quiz-opt');
  allOpts.forEach(b => b.classList.add('disabled'));

  const fb = document.getElementById('q-feedback');
  fb.style.display = 'block';

  if(chosen === correct) {
    btn.classList.add('correct');
    fb.className = 'quiz-feedback ok';
    fb.innerText = '✅ სწორია! გაიმარჯვე!';
    stats.correct++;
  } else {
    btn.classList.add('wrong');
    fb.className = 'quiz-feedback fail';
    fb.innerHTML = `❌ არასწორი — სწორი: <strong>${correct}</strong>`;
    stats.wrong++;
    allOpts.forEach(b => { if(b.innerHTML === correct) b.classList.add('correct'); });
  }
  document.getElementById('q-correct').innerText = stats.correct;
  document.getElementById('q-wrong').innerText = stats.wrong;
  document.getElementById('btn-next-q').style.display = 'block';
  saveStats();
}

// ========== ADD WORD (AI via Claude API) ==========
async function saveWordWithAI() {
  const term = document.getElementById('in-term').value.trim();
  const cat = document.getElementById('in-cat').value.trim() || 'General';
  const apiKey = getApiKey();

  if(!term) { showStatus('ჩაწერეთ ტერმინი!', 'error'); return; }
  if(!apiKey) { showStatus('❌ ჯერ შეიყვანეთ API Key ზემოთ!', 'error'); return; }

  const existing = words.find(w => w.term.toLowerCase() === term.toLowerCase());
  if(existing) { showStatus('ეს სიტყვა უკვე გაქვს!', 'error'); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  showStatus('🤖 AI ამუშავებს...', 'loading');

  try {
    const prompt = `You are a medical English dictionary. For the term "${term}", provide ONLY a JSON object with these fields:
{
  "ipa": "IPA pronunciation",
  "level": "B1 or B2 or C1 or C2",
  "def": "clear English definition (1-2 sentences)",
  "ex": "example sentence using the term",
  "geo": "Georgian translation"
}
Return ONLY the JSON object, nothing else.`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 400,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      const errMsg = errData.error?.message || `HTTP ${res.status}`;
      throw new Error(errMsg);
    }

    const data = await res.json();
    console.log('FULL RESPONSE:', JSON.stringify(data));

    if (!data.content || !Array.isArray(data.content) || data.content.length === 0) {
      throw new Error('პასუხი ცარიელია. სტრუქტურა: ' + JSON.stringify(data).substring(0, 150));
    }

    const raw = data.content.map(i => i.text || '').join('').trim();
    console.log('RAW TEXT:', raw);

    if (!raw) {
      throw new Error('ტექსტი ცარიელია. content: ' + JSON.stringify(data.content).substring(0, 150));
    }

    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('JSON ვერ მოიძებნა: ' + raw.substring(0, 150));
    const parsed = JSON.parse(match[0]);

    words.push({ term, ipa: parsed.ipa || '', level: parsed.level || 'C1', cat, def: parsed.def, ex: parsed.ex || '', geo: parsed.geo || '' });
    save();
    idx = words.length - 1;
    updateView();
    showStatus(`✅ "${term}" დაემატა!`, 'success');
    document.getElementById('in-term').value = '';
    document.getElementById('in-cat').value = '';
    setTimeout(() => navigate('study'), 1800);
  } catch(e) {
    console.error(e);
    if (e.message.includes('401') || e.message.includes('authentication')) {
      showStatus('❌ API Key არასწორია. შეამოწმეთ და ხელახლა შეიყვანეთ.', 'error');
    } else if (e.message.includes('429')) {
      showStatus('❌ ლიმიტი ამოიწურა. ცოტა ხანში სცადეთ.', 'error');
    } else {
      showStatus('❌ შეცდომა: ' + e.message, 'error');
    }
  }
  btn.disabled = false;
}

function showStatus(msg, type) {
  const el = document.getElementById('ai-status');
  el.innerText = msg;
  el.className = 'ai-status ' + type;
}

// ========== STATS ==========
function renderStats() {
  document.getElementById('stat-total').innerText = words.length;
  document.getElementById('stat-quiz').innerText = stats.correct;
  const cats = [...new Set(words.map(w => w.cat || 'General'))];
  document.getElementById('stat-cats').innerText = cats.length;
  document.getElementById('stat-streak').innerText = stats.streak || 0;

  const list = document.getElementById('word-list');
  list.innerHTML = '';
  [...words].reverse().forEach((w, i) => {
    const realIdx = words.length - 1 - i;
    const div = document.createElement('div');
    div.className = 'word-item';
    div.innerHTML = `
      <div>
        <div class="word-name">${w.term}</div>
        <div class="word-ipa-small">${w.ipa || ''} · ${w.cat || 'General'}</div>
      </div>
      <button class="del-btn" onclick="deleteWord(${realIdx})">🗑</button>
    `;
    list.appendChild(div);
  });
}

function deleteWord(i) {
  if(words.length <= 1) { alert('მინიმუმ 1 სიტყვა უნდა დარჩეს!'); return; }
  if(!confirm(`წაშალოთ "${words[i].term}"?`)) return;
  words.splice(i, 1);
  if(idx >= words.length) idx = words.length - 1;
  save();
  updateView();
  renderStats();
}

// ========== INIT ==========
updateView();
updateHeaderSub();
document.getElementById('q-correct').innerText = stats.correct;
document.getElementById('q-wrong').innerText = stats.wrong;
</script>
