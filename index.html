<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedVocab-Pro v10.0</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --success: #22c55e; --error: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        
        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 3D Card */
        .flip-card { perspective: 1000px; max-width: 400px; margin: 10px auto; height: 350px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; padding: 25px; box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; }
        .card-back { transform: rotateY(180deg); text-align: left; overflow-y: auto; }

        /* Inputs & Buttons */
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background: var(--success); color: white; width: 100%; }
        .btn-export { background: #64748b; color: white; margin-top: 10px; width: 100%; }

        /* Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 70px; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #64748b; }
        .nav-item.active { color: var(--primary); font-weight: bold; border-top: 3px solid var(--primary); }

        .list-item { background: white; padding: 15px; margin-bottom: 8px; border-radius: 12px; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>

    <header class="header">
        <h2 style="margin:0;">MedVocab-Pro</h2>
        <small id="stat">Loading...</small>
    </header>

    <div id="p-study" class="page active">
        <div class="flip-card" onclick="this.classList.toggle('flipped')">
            <div class="flip-card-inner" id="card-inner">
                <div class="card-front">
                    <h1 id="term" style="color:var(--primary); margin:0;">...</h1>
                    <div id="trans" style="color:#64748b; margin-top:10px;"></div>
                    <p style="color:#94a3b8; font-size:12px; margin-top:60px;">შეეხე გადმოსაბრუნებლად</p>
                </div>
                <div class="card-back" id="def"></div>
            </div>
        </div>
        <div style="display:flex; gap:10px; max-width:400px; margin:20px auto;">
            <button onclick="prev()" style="flex:1; background:#cbd5e1;">წინა</button>
            <button onclick="speak()" style="font-size:24px; background:white; border:1px solid #ddd;">🔊</button>
            <button onclick="next()" style="flex:1; background:var(--primary); color:white;">შემდეგი</button>
        </div>
    </div>

    <div id="p-list" class="page">
        <input type="text" id="search" placeholder="ძებნა..." oninput="filterL()">
        <div id="list-box"></div>
    </div>

    <div id="p-manage" class="page">
        <div style="max-width:400px; margin:auto;">
            <h3>➕ ახალი სიტყვის დამატება</h3>
            <input type="text" id="new-term" placeholder="სიტყვა (მაგ: Pruritus)">
            <input type="text" id="new-trans" placeholder="ტრანსკრიპცია (არასავალდებულო)">
            <textarea id="new-def" placeholder="განმარტება (ინგლისურად)"></textarea>
            <input type="text" id="new-simple" placeholder="მოკლე თარგმანი (ქართულად)">
            <button class="btn-add" onclick="addNewWord()">კალათაში ჩამატება</button>
            
            <hr style="margin:30px 0;">
            <h3>📁 ბაზის მართვა</h3>
            <p style="font-size:12px; color:#64748b;">ატვირთეთ JSON ფაილი ან მოახდინეთ მიმდინარე ბაზის ექსპორტი.</p>
            <input type="file" id="file-input" accept=".json" onchange="importFile(event)">
            <button class="btn-export" onclick="exportData()">ბაზის ექსპორტი (Download JSON)</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="n-study" onclick="nav('study')">📖 სწავლა</div>
        <div class="nav-item" id="n-list" onclick="nav('list')">📚 სია</div>
        <div class="nav-item" id="n-manage" onclick="nav('manage')">⚙️ მართვა</div>
    </nav>

    <script>
        let words = [];
        let i = 0;

        async function init() {
            // 1. ჯერ ვამოწმებთ ლოკალურ მეხსიერებას
            const saved = localStorage.getItem('my_med_vocab');
            if(saved) {
                words = JSON.parse(saved);
                show();
            } else {
                // 2. თუ ცარიელია, ვტვირთავთ ფაილიდან
                try {
                    const res = await fetch('./words.json');
                    words = await res.json();
                    save();
                    show();
                } catch (e) { console.log("JSON Load Error"); }
            }
        }

        function save() {
            // დუბლიკატების წაშლა და სორტირება შენახვამდე
            words = Array.from(new Map(words.map(w => [w.term.toLowerCase().trim(), w])).values())
                         .sort((a, b) => a.term.localeCompare(b.term));
            localStorage.setItem('my_med_vocab', JSON.stringify(words));
        }

        function show() {
            if(!words.length) return;
            const w = words[i];
            document.querySelector('.flip-card').classList.remove('flipped');
            document.getElementById('term').innerText = w.term;
            document.getElementById('trans').innerText = w.trans || '';
            document.getElementById('def').innerHTML = `
                <div style="font-size:14px;">${marked.parse(w.def || '')}</div>
                <div style="background:#f0f7ff; padding:10px; border-radius:10px; border-top:3px solid var(--primary); margin-top:10px;">
                    <strong>ქართულად:</strong><br>${w.simpleDef || ''}
                </div>
            `;
            document.getElementById('stat').innerText = `${i+1} / ${words.length}`;
        }

        function addNewWord() {
            const term = document.getElementById('new-term').value;
            const def = document.getElementById('new-def').value;
            const simple = document.getElementById('new-simple').value;
            const trans = document.getElementById('new-trans').value;

            if(!term || !simple) return alert("შეავსეთ სიტყვა და თარგმანი!");

            const newObj = {
                term: term.trim(),
                trans: trans.trim(),
                def: `**Definition:** ${def}`,
                simpleDef: simple.trim()
            };

            words.push(newObj);
            save();
            alert("სიტყვა დაემატა!");
            // გასუფთავება
            document.querySelectorAll('#p-manage input, #p-manage textarea').forEach(el => el.value = '');
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(words, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "words_updated.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function importFile(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const imported = JSON.parse(e.target.result);
                words = [...words, ...imported];
                save();
                alert("ფაილი წარმატებით ჩაიტვირთა!");
                show();
            };
            reader.readAsText(event.target.files[0]);
        }

        function filterL() {
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = words.filter(w => w.term.toLowerCase().includes(q) || w.simpleDef.toLowerCase().includes(q));
            const box = document.getElementById('list-box');
            box.innerHTML = filtered.map(w => `
                <div class="list-item" onclick="jumpTo('${w.term}')">
                    <strong>${w.term}</strong> <small>${w.trans || ''}</small><br>
                    <small>${w.simpleDef}</small>
                </div>
            `).join('');
        }

        function jumpTo(t) {
            i = words.findIndex(w => w.term === t);
            nav('study');
            show();
        }

        function nav(p) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('p-' + p).classList.add('active');
            document.getElementById('n-' + p).classList.add('active');
            if(p === 'list') filterL();
        }

        function next() { i = (i + 1) % words.length; show(); }
        function prev() { i = (i - 1 + words.length) % words.length; show(); }
        function speak() {
            const m = new SpeechSynthesisUtterance(words[i].term);
            m.lang = 'en-US';
            speechSynthesis.speak(m);
        }

        init();
    </script>
</body>
</html>
