<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedVocab Pro + Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans">
    <div class="max-w-md mx-auto">
        <header class="text-center py-6">
            <h1 class="text-3xl font-bold text-blue-700 font-serif">MedVocab Pro</h1>
            <p class="text-slate-500 italic">Medical English Practice</p>
        </header>

        <div id="quiz-container" class="mb-8 bg-blue-600 p-6 rounded-3xl text-white shadow-lg">
            <h3 class="font-bold mb-2">Daily Quiz:</h3>
            <p id="quiz-question" class="text-lg mb-4 italic leading-tight">Loading question...</p>
            <div id="quiz-options" class="grid grid-cols-1 gap-2"></div>
            <p id="quiz-feedback" class="mt-3 font-bold hidden"></p>
        </div>

        <div id="vocab-container" class="space-y-4">
            </div>
    </div>

    <script>
        const words = [
            { w: "Exacerbation", t: "/ɪɡˌzæs.əˈbeɪ.ʃən/", g: "გამწვავება", e: "Acute exacerbation of symptoms." },
            { w: "Auscultation", t: "/ˌɔː.skəlˈteɪ.ʃən/", g: "აუსკულტაცია", e: "Cardiac auscultation revealed a murmur." },
            { w: "Idiopathic", t: "/ˌɪd.i.əˈpæθ.ɪk/", g: "იდიოპათიური", e: "The condition is idiopathic." }
        ];

        // Render Vocabulary
        const container = document.getElementById('vocab-container');
        words.forEach(item => {
            const card = document.createElement('div');
            card.className = "bg-white p-5 rounded-2xl shadow-sm border border-slate-100";
            card.innerHTML = `<div class="flex justify-between items-center"><h2 class="text-xl font-bold text-slate-800">${item.w}</h2><button onclick="speak('${item.w}')" class="bg-blue-50 p-2 rounded-full">🔊</button></div><p class="text-blue-500 text-sm italic">${item.t}</p><p class="mt-1 font-medium">${item.g}</p><p class="text-xs text-slate-400 mt-2 bg-slate-50 p-2 rounded">"${item.e}"</p>`;
            container.appendChild(card);
        });

        // Quiz Logic
        let currentWord = words[Math.floor(Math.random() * words.length)];
        document.getElementById('quiz-question').innerText = `What does "${currentWord.w}" mean?`;
        
        const optionsContainer = document.getElementById('quiz-options');
        const allOptions = [...words].sort(() => 0.5 - Math.random());
        
        allOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "bg-white/20 hover:bg-white/30 p-3 rounded-xl text-left transition-all border border-white/10";
            btn.innerText = opt.g;
            btn.onclick = () => {
                const feedback = document.getElementById('quiz-feedback');
                feedback.classList.remove('hidden');
                if(opt.w === currentWord.w) {
                    feedback.innerText = "✅ სწორია!";
                    feedback.className = "mt-3 font-bold text-green-300";
                } else {
                    feedback.innerText = "❌ სცადეთ თავიდან";
                    feedback.className = "mt-3 font-bold text-red-300";
                }
            };
            optionsContainer.appendChild(btn);
        });

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
