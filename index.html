<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedVocab-Pro | სამედიცინო ინგლისური</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap');
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .nav-btn { cursor: pointer; transition: 0.2s; }
        .nav-btn:hover { color: #2563eb; }
        .active-nav { color: #2563eb; border-bottom: 2px solid #2563eb; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-hospital-user"></i> MedVocab-Pro
            </h1>
            <span id="wordCount" class="bg-blue-700 px-3 py-1 rounded-full text-sm">0 სიტყვა</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 mt-4">
        
        <section id="studySection" class="space-y-4">
            <div id="wordList" class="grid gap-4">
                </div>
        </section>

        <section id="quizSection" class="hidden text-center space-y-6 py-10">
            <div id="quizContent">
                <div class="text-6xl mb-6">🧠</div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">ქვიზის რეჟიმი</h2>
                <p id="quizError" class="text-red-500 bg-red-50 p-4 rounded-lg">
                    ქვიზის დასაწყებად საჭიროა მინიმუმ 2 სიტყვა ბაზაში.
                </p>
                <button onclick="startQuiz()" id="startQuizBtn" class="hidden bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">
                    დაწყება
                </button>
            </div>
            <div id="activeQuiz" class="hidden bg-white p-8 rounded-3xl shadow-xl border border-gray-100 max-w-md mx-auto">
                <p class="text-sm text-blue-500 font-bold mb-2 uppercase tracking-widest">რა არის ამის თარგმანი?</p>
                <h3 id="questionWord" class="text-3xl font-black text-gray-800 mb-8 tracking-tight"></h3>
                <div id="options" class="grid gap-3"></div>
            </div>
        </section>

        <section id="addSection" class="hidden max-w-md mx-auto bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
            <h2 class="text-2xl font-bold text-center mb-6">AI დამატება</h2>
            <div class="space-y-4">
                <input type="text" id="newWord" placeholder="ჩაწერეთ ტერმინი (მაგ: Adherence)" 
                       class="w-full p-4 border-2 border-gray-100 rounded-2xl focus:border-blue-500 outline-none transition-all">
                <button id="aiBtn" onclick="handleAIAdd()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 shadow-lg flex justify-center items-center gap-2">
                    <span id="btnText">🪄 გენერირება</span>
                    <i id="spinner" class="fas fa-spinner fa-spin hidden"></i>
                </button>
                <p id="aiStatus" class="text-sm text-center font-medium"></p>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-3 shadow-2xl flex justify-around items-center z-50">
        <div onclick="showSection('study')" class="nav-btn flex flex-col items-center active-nav" id="nav-study">
            <i class="fas fa-book-medical text-xl"></i>
            <span class="text-xs mt-1 font-medium">სწავლა</span>
        </div>
        <div onclick="showSection('quiz')" class="nav-btn flex flex-col items-center" id="nav-quiz">
            <i class="fas fa-pen-nib text-xl"></i>
            <span class="text-xs mt-1 font-medium">ქვიზი</span>
        </div>
        <div onclick="showSection('add')" class="nav-btn flex flex-col items-center" id="nav-add">
            <i class="fas fa-plus-circle text-xl text-blue-600"></i>
            <span class="text-xs mt-1 font-medium">დამატება</span>
        </div>
    </nav>

    <script>
        // 1. Initial Data (ბაზა)
        let words = JSON.parse(localStorage.getItem('medWords')) || [
            { english: "Diagnosis", georgian: "დიაგნოზი", ipa: "/ˌdaɪ.əɡˈnoʊ.sɪs/", definition: "The identification of the nature of an illness.", example: "The doctor made a quick diagnosis." }
        ];

        // 2. Navigation Logic
        function showSection(section) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            
            document.getElementById(section + 'Section').classList.remove('hidden');
            document.getElementById('nav-' + section).classList.add('active-nav');
            
            if(section === 'study') renderList();
            if(section === 'quiz') checkQuizStatus();
        }

        // 3. Render Word List
        function renderList() {
            const list = document.getElementById('wordList');
            document.getElementById('wordCount').innerText = `${words.length} სიტყვა`;
            list.innerHTML = words.map((w, index) => `
                <div class="card bg-white p-6 rounded-3xl shadow-sm border border-gray-100 relative overflow-hidden">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-2xl font-bold text-blue-600">${w.english}</h3>
                            <p class="text-sm font-mono text-gray-400 mt-1">${w.ipa || ''}</p>
                        </div>
                        <button onclick="deleteWord(${index})" class="text-gray-300 hover:text-red-500 transition">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                    <p class="text-lg font-bold text-gray-800 mt-3">${w.georgian}</p>
                    <div class="mt-4 pt-4 border-t border-dashed border-gray-100">
                        <p class="text-sm text-gray-600 leading-relaxed italic">"${w.definition}"</p>
                        <p class="text-xs text-blue-400 mt-2 font-medium">Ex: ${w.example || ''}</p>
                    </div>
                </div>
            `).join('');
        }

        function deleteWord(index) {
            if(confirm('ნამდვილად გსურთ წაშლა?')) {
                words.splice(index, 1);
                saveData();
                renderList();
            }
        }

        function saveData() {
            localStorage.setItem('medWords', JSON.stringify(words));
        }

        // 4. AI Functionality (კრიტიკული ნაწილი)
        async function handleAIAdd() {
            const wordInput = document.getElementById('newWord');
            const word = wordInput.value.trim();
            const status = document.getElementById('aiStatus');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');

            if (!word) return;

            // UI Loading State
            status.innerText = "AI ამუშავებს ტერმინს...";
            status.className = "text-sm text-center font-medium text-blue-500";
            btnText.innerText = "გთხოვთ დაელოდოთ";
            spinner.classList.remove('hidden');

            try {
                // მოთხოვნა ჩვენს Vercel API-სთან
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ word: word })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.details || "სერვერის შეცდომა");
                }

                const data = await response.json();
                
                // ბაზაში დამატება
                words.push({
                    english: word,
                    georgian: data.georgian,
                    ipa: data.ipa || '',
                    definition: data.definition,
                    example: data.example || ''
                });

                saveData();
                wordInput.value = "";
                status.innerText = "✅ წარმატებით დაემატა!";
                status.className = "text-sm text-center font-medium text-green-500";
                
                setTimeout(() => showSection('study'), 1500);

            } catch (err) {
                console.error(err);
                status.innerText = "❌ შეცდომა: " + err.message;
                status.className = "text-sm text-center font-medium text-red-500";
            } finally {
                btnText.innerText = "🪄 გენერირება";
                spinner.classList.add('hidden');
            }
        }

        // 5. Quiz Logic
        function checkQuizStatus() {
            const error = document.getElementById('quizError');
            const btn = document.getElementById('startQuizBtn');
            const active = document.getElementById('activeQuiz');
            
            active.classList.add('hidden');
            if (words.length >= 2) {
                error.classList.add('hidden');
                btn.classList.remove('hidden');
            } else {
                error.classList.remove('hidden');
                btn.classList.add('hidden');
            }
        }

        function startQuiz() {
            document.getElementById('startQuizBtn').classList.add('hidden');
            document.getElementById('activeQuiz').classList.remove('hidden');
            nextQuestion();
        }

        function nextQuestion() {
            const correct = words[Math.floor(Math.random() * words.length)];
            const options = [correct.georgian];
            
            while(options.length < 3 && words.length > options.length) {
                const random = words[Math.floor(Math.random() * words.length)].georgian;
                if(!options.includes(random)) options.push(random);
            }
            options.sort(() => Math.random() - 0.5);

            document.getElementById('questionWord').innerText = correct.english;
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = options.map(opt => `
                <button onclick="checkAnswer('${opt}', '${correct.georgian}')" 
                        class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl font-bold hover:border-blue-500 transition-all active:scale-95">
                    ${opt}
                </button>
            `).join('');
        }

        function checkAnswer(selected, correct) {
            if(selected === correct) {
                alert('სწორია! 🎉');
                nextQuestion();
            } else {
                alert('სცადეთ თავიდან! ❌');
            }
        }

        // Initial Load
        renderList();
    </script>
</body>
</html>
