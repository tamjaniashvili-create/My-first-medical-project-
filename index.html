<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MedVocab-Pro v21.0</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #1d4ed8; --blue-light: #dbeafe; --green: #16a34a; --green-light: #dcfce7;
  --red: #dc2626; --red-light: #fee2e2; --amber: #d97706; --amber-light: #fef3c7;
  --purple: #7c3aed; --purple-light: #ede9fe; --bg: #f8fafc; --card: #ffffff;
  --text: #0f172a; --muted: #64748b; --border: #e2e8f0; --radius: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; }
header { background: var(--blue); color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 12px rgba(29,78,216,0.3); }
.header-title { font-family: 'DM Serif Display', serif; font-size: 20px; }
.header-sub { font-size: 11px; opacity: 0.75; margin-top: 1px; }

.container { padding: 20px 16px 100px; }
.page { display: none; animation: fadeIn 0.3s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* ბარათის დიზაინი */
.card-box { perspective: 1200px; height: 340px; cursor: pointer; margin-bottom: 20px; }
.card-inner { width: 100%; height: 100%; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); transform-style: preserve-3d; position: relative; }
.card-inner.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: var(--radius); padding: 28px 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--card); box-shadow: 0 4px 24px rgba(0,0,0,0.08); border: 1px solid var(--border); }
.card-back { transform: rotateY(180deg); align-items: flex-start; justify-content: flex-start; padding-top: 24px; background: #fafbff; overflow-y: auto; }

.level-badge { padding: 4px 14px; border-radius: 99px; font-size: 12px; font-weight: 700; margin-bottom: 14px; }
.badge-med { background: var(--purple-light); color: var(--purple); }
.card-term { font-family: 'DM Serif Display', serif; font-size: 38px; color: var(--blue); text-align: center; line-height: 1.1; }
.card-ipa { color: var(--muted); font-size: 15px; margin-top: 8px; }
.speak-btn { margin-top: 16px; background: var(--blue-light); color: var(--blue); border: none; border-radius: 99px; padding: 8px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }

/* ქვიზის სტილები */
.quiz-opt { padding: 16px; border: 2px solid var(--border); margin-bottom: 10px; border-radius: 14px; cursor: pointer; background: white; font-size: 14px; width: 100%; text-align: left; font-family: inherit; }
.quiz-opt.correct { border-color: var(--green); background: var(--green-light); color: var(--green); }
.quiz-opt.wrong { border-color: var(--red); background: var(--red-light); color: var(--red); }

/* ნავიგაცია */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: white; border-top: 1px solid var(--border); display: flex; z-index: 999; box-shadow: 0 -4px 20px rgba(0,0,0,0.08); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0; cursor: pointer; color: var(--muted); font-size: 11px; border: none; background: none; }
.nav-item.active { color: var(--blue); font-weight: 700; }
.nav-icon { font-size: 20px; margin-bottom: 2px; }

/* AI სტატუსი */
.ai-status { padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; text-align: center; margin-top: 10px; display: none; }
.loading { display: block; background: var(--amber-light); color: var(--amber); }
.success { display: block; background: var(--green-light); color: var(--green); }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">MedVocab-Pro</div>
    <div class="header-sub" id="header-sub">სწავლა</div>
  </div>
  <div style="font-size: 20px;">🇬🇪</div>
</header>

<div class="container">
  <div id="page-study" class="page active">
    <div class="card-box" onclick="flipCard()">
      <div class="card-inner" id="card-inner">
        <div class="card-face">
          <span class="level-badge badge-med" id="c-level">MED</span>
          <div class="card-term" id="c-term">Loading...</div>
          <div class="card-ipa" id="c-ipa">/ipa/</div>
          <button class="speak-btn" onclick="event.stopPropagation(); speakTerm()">🔊 მოისმინე</button>
        </div>
        <div class="card-face card-back">
          <p style="color:var(--blue); font-weight:700; font-size:11px; text-transform:uppercase;">განმარტება</p>
          <p id="c-def" style="margin-bottom:15px; font-size:15px; line-height:1.4;"></p>
          <p style="color:var(--green); font-weight:700; font-size:11px; text-transform:uppercase;">ქართულად</p>
          <p id="c-geo" style="font-size:16px; font-weight:600; color:var(--green);"></p>
        </div>
      </div>
    </div>
    <div style="display:flex; gap:12px;">
      <button onclick="changeIdx(-1)" style="flex:1; padding:15px; border-radius:15px; border:1px solid var(--border); background:white; font-weight:700;">⬅️ წინა</button>
      <button onclick="changeIdx(1)" style="flex:2; padding:15px; border-radius:15px; border:none; background:var(--blue); color:white; font-weight:700;">შემდეგი ➡️</button>
    </div>
  </div>

  <div id="page-quiz" class="page">
    <div style="background:white; padding:20px; border-radius:var(--radius); box-shadow:0 4px 15px rgba(0,0,0,0.05);">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:13px; font-weight:700; color:var(--blue);">
            <span>ქვიზი</span>
            <span id="quiz-score">სწორი: 0</span>
        </div>
        <div id="q-text" style="font-family:'DM Serif Display', serif; font-size:22px; margin-bottom:20px;"></div>
        <div id="q-options"></div>
        <button id="btn-next-q" onclick="initQuiz()" style="display:none; width:100%; padding:15px; margin-top:15px; background:var(--blue); color:white; border:none; border-radius:12px; font-weight:700;">შემდეგი კითხვა</button>
    </div>
  </div>

  <div id="page-add" class="page">
    <div style="background:white; padding:24px; border-radius:var(--radius); border:1px solid var(--border);">
      <h3 style="font-family:'DM Serif Display', serif; font-size:22px; margin-bottom:15px;">✨ AI დამატება (Gemini)</h3>
      <input type="text" id="in-term" placeholder="მაგ: Tachycardia" style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); margin-bottom:10px; font-size:16px;">
      <input type="text" id="in-cat" placeholder="კატეგორია (Cardiology)" style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); margin-bottom:15px; font-size:16px;">
      <button id="btn-save" onclick="generateAI()" style="width:100%; padding:16px; border-radius:12px; border:none; background:var(--blue); color:white; font-weight:700; font-size:16px;">🪄 გენერირება</button>
      <div id="ai-status" class="ai-status"></div>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-item active" id="nav-study" onclick="navigate('study')"><span class="nav-icon">📚</span>სწავლა</button>
  <button class="nav-item" id="nav-quiz" onclick="navigate('quiz')"><span class="nav-icon">📝</span>ქვიზი</button>
  <button class="nav-item" id="nav-add" onclick="navigate('add')"><span class="nav-icon">✨</span>AI დამატება</button>
</nav>

<script>
let words = JSON.parse(localStorage.getItem('medvocab_v21')) || [
    { term:"Diagnosis", ipa:"/ˌdaɪəɡˈnoʊsɪs/", def:"Identification of a disease from symptoms.", geo:"დიაგნოზი" }
];
let stats = { correct: 0 };
let idx = 0;

function save() { localStorage.setItem('medvocab_v21', JSON.stringify(words)); }

function navigate(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  document.getElementById('header-sub').innerText = p === 'study' ? 'სწავლა' : p === 'quiz' ? 'ქვიზი' : 'AI დამატება';
  if(p === 'quiz') initQuiz();
}

function updateView() {
  const w = words[idx];
  document.getElementById('c-term').innerText = w.term;
  document.getElementById('c-ipa').innerText = w.ipa || '';
  document.getElementById('c-def').innerText = w.def;
  document.getElementById('c-geo').innerText = w.geo;
  document.getElementById('card-inner').classList.remove('flipped');
}

function changeIdx(d) { idx = (idx + d + words.length) % words.length; updateView(); }
function flipCard() { document.getElementById('card-inner').classList.toggle('flipped'); }
function speakTerm() {
  const u = new SpeechSynthesisUtterance(words[idx].term);
  u.lang = 'en-US'; window.speechSynthesis.speak(u);
}

// QUIZ LOGIC
function initQuiz() {
  if(words.length < 2) { document.getElementById('q-text').innerText = "დაამატეთ მეტი სიტყვა!"; return; }
  document.getElementById('btn-next-q').style.display = 'none';
  const correct = words[Math.floor(Math.random() * words.length)];
  document.getElementById('q-text').innerText = `რას ნიშნავს "${correct.term}"?`;
  
  let opts = [correct.geo];
  while(opts.length < 3) {
    let rand = words[Math.floor(Math.random() * words.length)].geo;
    if(!opts.includes(rand)) opts.push(rand);
  }
  opts.sort(() => Math.random() - 0.5);

  const container = document.getElementById('q-options');
  container.innerHTML = '';
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'quiz-opt';
    b.innerText = o;
    b.onclick = () => {
      if(o === correct.geo) { b.classList.add('correct'); stats.correct++; }
      else { b.classList.add('wrong'); }
      document.getElementById('quiz-score').innerText = `სწორი: ${stats.correct}`;
      document.getElementById('btn-next-q').style.display = 'block';
      Array.from(container.children).forEach(btn => btn.onclick = null);
    };
    container.appendChild(b);
  });
}

// GEMINI AI INTEGRATION
async function generateAI() {
  const term = document.getElementById('in-term').value.trim();
  const cat = document.getElementById('in-cat').value.trim() || 'General';
  const status = document.getElementById('ai-status');
  if(!term) return;

  status.innerText = "🤖 Gemini ამუშავებს...";
  status.className = "ai-status loading";

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ word: term, category: cat })
    });
    const data = await res.json();
    if(!res.ok) throw new Error();

    words.push({ term, ipa: data.ipa, def: data.definition, geo: data.georgian });
    save();
    status.innerText = "✅ წარმატებით დაემატა!";
    status.className = "ai-status success";
    document.getElementById('in-term').value = '';
    setTimeout(() => { idx = words.length-1; updateView(); navigate('study'); }, 1500);
  } catch(e) {
    status.innerText = "❌ შეცდომა. შეამოწმეთ Vercel API Key.";
    status.className = "ai-status error";
  }
}

updateView();
</script>
</body>
</html>
