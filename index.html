<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedVocab-Pro v7.5</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        .page { display: none; padding: 15px; }
        .active { display: block; }
        .card { background: white; border-radius: 20px; min-height: 250px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; margin: 10px auto; max-width: 400px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 65px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #64748b; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        button { padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        .btn-main { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .q-opt { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; background: white; text-align: left; }
    </style>
</head>
<body>

    <header class="header">
        <h2 style="margin:0;">MedVocab-Pro</h2>
        <small id="stat">...</small>
    </header>

    <div id="p-study" class="page active">
        <div class="card" onclick="flip()">
            <h1 id="term" style="color:var(--primary)">...</h1>
            <div id="def" style="display:none; text-align:left; margin-top:15px; border-top:1px solid #eee; padding-top:10px;"></div>
            <p id="hint" style="color:#94a3b8; font-size:12px; margin-top:20px;">დააჭირე ნახვისთვის</p>
        </div>
        <div style="display:flex; gap:10px; max-width:400px; margin:auto;">
            <button onclick="prev()" style="flex:1; background:#94a3b8; color:white;">წინა</button>
            <button onclick="speak()" style="font-size:20px;">🔊</button>
            <button onclick="next()" style="flex:1; background:var(--primary); color:white;">შემდეგი</button>
        </div>
    </div>

    <div id="p-quiz" class="page">
        <div style="max-width:400px; margin:auto;">
            <h3 id="q-txt">...</h3>
            <div id="q-box"></div>
        </div>
    </div>

    <div id="p-list" class="page">
        <div id="list-box" style="max-width:400px; margin:auto;"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="n-study" onclick="nav('study')">📖 სწავლა</div>
        <div class="nav-item" id="n-quiz" onclick="nav('quiz')">🧠 ქვიზი</div>
        <div class="nav-item" id="n-list" onclick="nav('list')">📚 სია</div>
    </nav>

    <script>
        let words = [];
        let i = 0;

        async function init() {
            try {
                const res = await fetch('./words.json');
                words = await res.json();
                show();
            } catch (e) { document.getElementById('term').innerText = "JSON Error!"; }
        }

        function show() {
            if(!words.length) return;
            document.getElementById('term').innerText = words[i].term;
            document.getElementById('def').innerHTML = marked.parse(words[i].def);
            document.getElementById('def').style.display = "none";
            document.getElementById('hint').style.display = "block";
            document.getElementById('stat').innerText = `${i+1} / ${words.length}`;
        }

        function flip() {
            const d = document.getElementById('def');
            const h = document.getElementById('hint');
            d.style.display = d.style.display === "none" ? "block" : "none";
            h.style.display = d.style.display === "none" ? "block" : "none";
        }

        function next() { i = (i + 1) % words.length; show(); }
        function prev() { i = (i - 1 + words.length) % words.length; show(); }
        function speak() {
            const m = new SpeechSynthesisUtterance(words[i].term);
            m.lang = 'en-US';
            speechSynthesis.speak(m);
        }

        function nav(p) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('p-' + p).classList.add('active');
            document.getElementById('n-' + p).classList.add('active');
            if(p === 'quiz') startQ();
            if(p === 'list') renderL();
        }

        function startQ() {
            const w = words[Math.floor(Math.random()*words.length)];
            document.getElementById('q-txt').innerText = `რა არის "${w.term}"?`;
            const box = document.getElementById('q-box');
            box.innerHTML = '';
            let opts = [w.simpleDef];
            while(opts.length<3) {
                let r = words[Math.floor(Math.random()*words.length)].simpleDef;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random()-0.5);
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'q-opt';
                b.innerText = o;
                b.onclick = () => {
                    if(o === w.simpleDef) { b.style.background="#dcfce7"; setTimeout(startQ, 800); }
                    else { b.style.background="#fee2e2"; }
                };
                box.appendChild(b);
            });
        }

        function renderL() {
            const box = document.getElementById('list-box');
            box.innerHTML = words.map((w, idx) => `
                <div style="background:white; padding:10px; margin-bottom:5px; border-radius:10px;" onclick="i=${idx}; nav('study')">
                    <strong>${w.term}</strong><br><small>${w.simpleDef}</small>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
