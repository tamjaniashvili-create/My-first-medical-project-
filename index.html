<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedVocab-Pro Storage-v2.2</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .card { background: white; border-radius: 20px; min-height: 300px; perspective: 1000px; margin-bottom: 20px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; min-height: 300px; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; border-radius: 20px; border: 1px solid #e2e8f0; }
        .card-back { transform: rotateY(180deg); background: #f1f5f9; }

        .search-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 65px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: #64748b; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .glossary-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>

    <header class="header">
        <h2 style="margin:0;">MedVocab-Pro</h2>
    </header>

    <div id="page-study" class="page active">
        <div id="progress-text" style="text-align:center; color:#64748b; margin-bottom:10px;">0 / 0</div>
        <div class="card" onclick="flipCard()">
            <div class="card-inner" id="card-inner">
                <div class="card-front">
                    <span id="c-level" style="font-size:10px; background:#eee; padding:3px 8px; border-radius:10px;">C1</span>
                    <h1 id="c-term" style="margin:10px 0;">...</h1>
                    <p id="c-ipa" style="color:var(--primary);"></p>
                    <button onclick="event.stopPropagation(); speak();" style="border:none; background:#f1f5f9; padding:8px 15px; border-radius:20px;">🔊 Listen</button>
                </div>
                <div class="card-back">
                    <p id="c-def" style="text-align:center;"></p>
                    <h3 id="c-geo" style="color:var(--primary);"></h3>
                    <small id="c-pos" style="color:#64748b;"></small>
                </div>
            </div>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="prev()" class="btn-action" style="background:#64748b;">Previous</button>
            <button onclick="next()" class="btn-action">Next</button>
        </div>
    </div>

    <div id="page-glossary" class="page">
        <input type="text" id="gloss-search" placeholder="Search..." class="search-input" oninput="renderGlossary(this.value)">
        <div id="glossary-list"></div>
    </div>

    <div id="page-add" class="page">
        <div style="background:white; padding:20px; border-radius:15px;">
            <h3>System Control</h3>
            <input type="text" id="in-term" placeholder="Enter word or 'RESET'" class="search-input">
            <button onclick="saveWordWithAI()" class="btn-action">Action / RESET</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-study" onclick="navigate('study')">📖 Study</div>
        <div class="nav-item" id="nav-glossary" onclick="navigate('glossary')">📚 Glossary</div>
        <div class="nav-item" id="nav-add" onclick="navigate('add')">⚙️ Manage</div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
