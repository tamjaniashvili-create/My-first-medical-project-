<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedVocab-Pro</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; color: var(--text); direction: ltr; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        
        .search-area { padding: 15px; display: flex; gap: 10px; background: white; border-bottom: 1px solid #e2e8f0; }
        .search-input { flex: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; width: 100%; }
        .mic-btn { background: var(--primary); color: white; border: none; border-radius: 10px; padding: 0 15px; font-size: 20px; }

        .page { display: none; padding: 20px; }
        .active { display: block; }

        .card { background: white; border-radius: 20px; min-height: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; perspective: 1000px; margin-top: 20px; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; min-height: 300px; cursor: pointer; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; border-radius: 20px; }
        .card-back { transform: rotateY(180deg); background: #f1f5f9; }

        .nav-btns { display: flex; justify-content: space-between; margin-top: 25px; gap: 20px; }
        .n-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; background: white; font-size: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #e2e8f0; height: 65px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: #64748b; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        .add-container { display: flex; flex-direction: column; gap: 15px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 17px; font-weight: bold; }
        
        #progress-bar { height: 6px; background: #e2e8f0; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 22px;">MedVocab-Pro</h1>
        <p style="margin:5px 0 0; font-size: 13px; opacity: 0.9;">Apotheca Alliance • Medical English</p>
    </div>

    <div id="page-study" class="page active">
        <div class="search-area">
            <input type="text" id="term-search" placeholder="🔍 მოძებნე ტერმინი..." class="search-input">
            <button onclick="startVoiceSearch()" class="mic-btn">🎤</button>
        </div>

        <div id="progress-bar"><div id="progress-fill"></div></div>
        <p id="progress-text" style="text-align:center; font-size: 14px; margin: 5px 0;">0/0</p>

        <div class="card" onclick="flipCard()">
            <div class="card-inner" id="card-inner">
                <div class="card-front">
                    <div style="font-size: 12px; color: var(--primary); font-weight: bold; margin-bottom: 10px;">C1/MEDICAL</div>
                    <h2 id="c-term" style="font-size: 32px; margin: 10px 0;">იტვირთება...</h2>
                    <p id="c-ipa" style="color: #64748b; font-size: 18px;"></p>
                    <button onclick="event.stopPropagation(); speak();" style="border: 1px solid #e2e8f0; background: none; padding: 8px 15px; border-radius: 20px; margin-top: 15px;">🔊 მოსმენა</button>
                </div>
                <div class="card-back">
                    <p id="c-def" style="font-size: 16px; line-height: 1.5;"></p>
                    <hr style="width: 80%; border: 0.5px solid #cbd5e1; margin: 15px 0;">
                    <p id="c-geo" style="font-size: 20px; font-weight: bold; color: #059669;"></p>
                </div>
            </div>
        </div>

        <div class="nav-btns">
            <button onclick="prev()" class="n-btn">◀</button>
            <button onclick="next()" class="n-btn">▶</button>
        </div>
    </div>

    <div id="page-add" class="page">
        <div class="add-container">
            <h2 style="margin-bottom: 5px;">ახალი ტერმინი</h2>
            <input type="text" id="in-term" placeholder="მაგ: Paradox" class="search-input">
            <button onclick="saveWordWithAI()" class="btn-main">🤖 Gemini AI გენერირება</button>
            <p id="ai-status" style="text-align: center; color: #64748b;"></p>
        </div>
    </div>

    <div id="page-quiz" class="page">
        <div id="quiz-box">
            <h2 id="q-question" style="text-align: center;"></h2>
            <div id="q-options" style="display: flex; flex-direction: column; gap: 10px;"></div>
            <p id="q-feedback" style="text-align: center; margin-top: 20px; font-weight: bold;"></p>
            <button id="btn-next-q" onclick="nextQuestion()" class="btn-main" style="display:none; background: #059669; width: 100%; margin-top: 20px;">შემდეგი</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-study" onclick="navigate('study')">📖<span>სწავლა</span></div>
        <div class="nav-item" id="nav-quiz" onclick="navigate('quiz')">🧠<span>ქვიზი</span></div>
        <div class="nav-item" id="nav-add" onclick="navigate('add')">➕<span>დამატება</span></div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
