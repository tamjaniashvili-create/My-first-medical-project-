<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedVocab-Pro v18.0 | AI Integrated</title>
    <style>
        :root { --blue: #2563eb; --green: #22c55e; --red: #ef4444; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; transition: 0.3s; }
        
        header { background: var(--blue); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .menu-content { display: none; position: absolute; right: 10px; background: white; min-width: 180px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); border-radius: 12px; top: 50px; }
        .menu-content a { color: #333; padding: 12px 16px; text-decoration: none; display: block; border-bottom: 1px solid #eee; }
        .show { display: block !important; }

        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }

        /* ფლეშქარდი */
        .card-box { perspective: 1000px; height: 300px; cursor: pointer; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 25px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; border: 2px solid #e2e8f0; padding: 25px; box-sizing: border-box; }
        .card-back { transform: rotateY(180deg); background: #f0f7ff; text-align: left; align-items: flex-start; }

        /* ქვიზი */
        .quiz-option { padding: 15px; border: 2px solid #e2e8f0; margin-top: 10px; border-radius: 15px; cursor: pointer; background: white; }
        .btn-next { background: var(--green); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 15px; display: none; width: 100%; }

        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">MedVocab-Pro v18.0</div>
    <div style="cursor:pointer; font-size:28px;" onclick="toggleMenu()">⋮</div>
    <div id="menu" class="menu-content">
        <a href="#" onclick="navigate('study')">📚 სწავლა</a>
        <a href="#" onclick="navigate('quiz')">📝 ქვიზი</a>
        <a href="#" onclick="navigate('add')">➕ დამატება (AI)</a>
    </div>
</header>

<div class="container">
    <div id="page-study" class="page active-page">
        <div class="card-box" onclick="this.querySelector('.card-inner').classList.toggle('is-flipped'); speakTerm();">
            <div class="card-inner">
                <div class="card-face">
                    <span id="c-level" style="background:#fee2e2; color:var(--red); padding:5px 12px; border-radius:15px; font-weight:bold; margin-bottom:15px;">C1</span>
                    <h1 id="c-term" style="margin:0; font-size:32px;">Adherence</h1>
                    <p id="c-ipa" style="color:#64748b; font-style:italic;">/ədˈhɪərəns/</p>
                    <div style="font-size:24px; margin-top:10px;">🔊</div>
                </div>
                <div class="card-face card-back">
                    <strong style="color:var(--blue)">Definition:</strong>
                    <p id="c-def" style="margin-bottom:15px;">Compliance with a medical regimen.</p>
                    <hr style="width:100%; border:0; border-top:1px solid #eee; margin:10px 0;">
                    <strong style="color:var(--blue)">Example:</strong>
                    <p id="c-ex" style="font-style:italic;">"The patient's adherence was excellent."</p>
                </div>
            </div>
        </div>
        <div style="display:flex; gap:15px; margin-top:20px;">
            <button onclick="changeIdx(-1)" style="flex:1; padding:15px; border-radius:15px; border:1px solid #ccc; background:white;">⬅️ წინა</button>
            <button onclick="changeIdx(1)" style="flex:1; padding:15px; border-radius:15px; border:1px solid #ccc; background:white;">შემდეგი ➡️</button>
        </div>
    </div>

    <div id="page-quiz" class="page">
        <div style="background:white; padding:25px; border-radius:25px;">
            <h3 id="q-text" style="margin-top:0;">რას ნიშნავს?</h3>
            <div id="q-options"></div>
            <div id="q-feedback" style="text-align:center; margin-top:15px; font-weight:bold;"></div>
            <button id="btn-next-q" class="btn-next" onclick="startQuiz()">შემდეგი კითხვა ➡️</button>
        </div>
    </div>

    <div id="page-add" class="page">
        <div style="background:white; padding:25px; border-radius:25px;">
            <h3 style="margin-top:0;">➕ სიტყვის დამატება</h3>
            <p style="font-size:13px; color:#666;">ჩაწერეთ ინგლისური ტერმინი და მნიშვნელობა/მაგალითი ავტომატურად მოიძებნება.</p>
            <input type="text" id="in-term" placeholder="მაგ: Clearance">
            <button id="btn-save" onclick="saveWordWithAI()" style="width:100%; padding:15px; background:var(--blue); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">ავტომატური დამატება</button>
        </div>
    </div>
</div>

<script>
    let words = JSON.parse(localStorage.getItem('med_v18')) || [
        { term: "Adherence", ipa: "/ədˈhɪərəns/", level: "C1", def: "Compliance with a medical regimen.", ex: "Strict adherence is required." }
    ];
    let idx = 0;

    function toggleMenu() { document.getElementById('menu').classList.toggle('show'); }

    function navigate(p) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
        document.getElementById('page-' + p).classList.add('active-page');
        if(p === 'quiz') startQuiz();
        toggleMenu();
    }

    function changeIdx(d) { idx = (idx + d + words.length) % words.length; updateView(); }

    function updateView() {
        const w = words[idx];
        document.getElementById('c-term').innerText = w.term;
        document.getElementById('c-ipa').innerText = w.ipa;
        document.getElementById('c-def').innerText = w.def;
        document.getElementById('c-ex').innerText = w.ex;
        document.querySelector('.card-inner').classList.remove('is-flipped');
    }

    function speakTerm() {
        const m = new SpeechSynthesisUtterance(words[idx].term);
        m.lang = 'en-US';
        window.speechSynthesis.speak(m);
    }

    // AI დამატება
    async function saveWordWithAI() {
        const term = document.getElementById('in-term').value.trim();
        const btn = document.getElementById('btn-save');
        if(!term) return;

        btn.innerText = "იძებნება...";
        btn.disabled = true;

        try {
            const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${term}`);
            const data = await res.json();

            if (data && data[0]) {
                const meaning = data[0].meanings[0].definitions[0];
                words.push({
                    term: term,
                    ipa: data[0].phonetic || "",
                    level: "C1",
                    def: meaning.definition,
                    ex: meaning.example || "No example found."
                });
                localStorage.setItem('med_v18', JSON.stringify(words));
                alert("სიტყვა დაემატა!");
                document.getElementById('in-term').value = '';
                idx = words.length - 1;
                updateView();
                navigate('study');
            } else { alert("ვერ მოიძებნა."); }
        } catch (e) { alert("შეცდომა კავშირისას."); }
        btn.innerText = "ავტომატური დამატება";
        btn.disabled = false;
    }

    // ქვიზი
    function startQuiz() {
        document.getElementById('btn-next-q').style.display = 'none';
        document.getElementById('q-feedback').innerText = '';
        const container = document.getElementById('q-options');
        container.innerHTML = '';

        if(words.length < 2) {
            document.getElementById('q-text').innerText = "დაამატეთ მეტი სიტყვა!";
            return;
        }

        const correct = words[Math.floor(Math.random() * words.length)];
        document.getElementById('q-text').innerText = `რას ნიშნავს "${correct.term}"?`;

        let opts = [correct.def];
        let others = words.filter(w => w.def !== correct.def).sort(() => 0.5 - Math.random());
        opts.push(...others.slice(0, 2).map(w => w.def));
        opts.sort(() => 0.5 - Math.random());

        opts.forEach(o => {
            const d = document.createElement('div');
            d.className = 'quiz-option';
            d.innerText = o;
            d.onclick = function() {
                if(o === correct.def) {
                    this.style.borderColor = "var(--green)";
                    document.getElementById('q-feedback').innerHTML = "<span style='color:var(--green)'>✅ სწორია!</span>";
                    document.getElementById('btn-next-q').style.display = 'block';
                } else {
                    this.style.borderColor = "var(--red)";
                    document.getElementById('q-feedback').innerHTML = "<span style='color:var(--red)'>❌ არასწორია</span>";
                }
            };
            container.appendChild(d);
        });
    }

    updateView();
</script>
</body>
</html>
