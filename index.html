<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MedVocab-Pro v20.0</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* აქ რჩება თქვენი ყველა ორიგინალური სტილი (CSS) */
:root {
  --blue: #1d4ed8; --blue-light: #dbeafe; --green: #16a34a; --green-light: #dcfce7;
  --red: #dc2626; --red-light: #fee2e2; --amber: #d97706; --amber-light: #fef3c7;
  --purple: #7c3aed; --purple-light: #ede9fe; --bg: #f8fafc; --card: #ffffff;
  --text: #0f172a; --muted: #64748b; --border: #e2e8f0; --radius: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; }
header { background: var(--blue); color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
.header-title { font-family: 'DM Serif Display', serif; font-size: 20px; }
.container { padding: 20px 16px 100px; }
.page { display: none; animation: fadeIn 0.3s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* ბარათის და ქვიზის სტილები... (შემოკლებული ვერსია ვიზუალისთვის) */
.card-box { height: 320px; cursor: pointer; margin-bottom: 20px; perspective: 1200px; }
.card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
.card-inner.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: var(--radius); padding: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--card); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.card-back { transform: rotateY(180deg); align-items: flex-start; justify-content: flex-start; background: #fafbff; }
.card-term { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--text); }

/* ნავიგაცია */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: white; border-top: 1px solid var(--border); display: flex; z-index: 999; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px; cursor: pointer; color: var(--muted); font-size: 11px; background: none; border: none; }
.nav-item.active { color: var(--blue); }

/* სტატუსი */
.status-msg { padding: 12px; border-radius: 12px; font-size: 14px; text-align: center; margin-top: 10px; display: none; }
.loading { display: block; background: var(--amber-light); color: var(--amber); }
.success { display: block; background: var(--green-light); color: var(--green); }
.error { display: block; background: var(--red-light); color: var(--red); }
</style>
</head>
<body>

<header>
  <div><div class="header-title">MedVocab-Pro</div><div id="header-sub" style="font-size:11px; opacity:0.8;">სწავლა</div></div>
</header>

<div class="container">
  <div id="page-study" class="page active">
    <div class="card-box" onclick="this.querySelector('.card-inner').classList.toggle('flipped')">
      <div class="card-inner">
        <div class="card-face">
            <div class="card-term" id="c-term">Hypertension</div>
            <div id="c-ipa" style="color:var(--muted); margin-top:10px;">/ˌhaɪpərˈtenʃən/</div>
        </div>
        <div class="card-face card-back">
            <p style="color:var(--blue); font-weight:700; font-size:11px;">განმარტება</p>
            <p id="c-def" style="margin-bottom:12px;"></p>
            <p style="color:var(--green); font-weight:700; font-size:11px;">ქართულად</p>
            <p id="c-geo" style="font-weight:600;"></p>
        </div>
      </div>
    </div>
    <button onclick="changeIdx(1)" style="width:100%; padding:15px; background:var(--blue); color:white; border:none; border-radius:15px; font-weight:700;">შემდეგი ➡️</button>
  </div>

  <div id="page-add" class="page">
    <div style="background:white; padding:24px; border-radius:var(--radius); box-shadow:0 4px 15px rgba(0,0,0,0.05);">
        <h3 style="margin-bottom:15px; font-family:'DM Serif Display', serif;">✨ AI დამატება</h3>
        <input type="text" id="in-term" placeholder="ინგლისური ტერმინი" style="width:100%; padding:15px; border:1px solid var(--border); border-radius:12px; margin-bottom:10px;">
        <input type="text" id="in-cat" placeholder="კატეგორია" style="width:100%; padding:15px; border:1px solid var(--border); border-radius:12px; margin-bottom:15px;">
        <button id="btn-save" onclick="saveWithGemini()" style="width:100%; padding:15px; background:var(--blue); color:white; border:none; border-radius:12px; font-weight:700;">🪄 ავტომატური გენერირება</button>
        <div id="status" class="status-msg"></div>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-item active" id="nav-study" onclick="navigate('study')">📚 სწავლა</button>
  <button class="nav-item" id="nav-add" onclick="navigate('add')">✨ დამატება</button>
</nav>

<script>
let words = JSON.parse(localStorage.getItem('medvocab_v20')) || [
    { term:"Hypertension", ipa:"/ˌhaɪpərˈtenʃən/", def:"High blood pressure.", geo:"ჰიპერტენზია" }
];
let idx = 0;

function navigate(p) {
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.getElementById('page-'+p).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById('nav-'+p).classList.add('active');
}

function updateView() {
    const w = words[idx];
    document.getElementById('c-term').innerText = w.term;
    document.getElementById('c-ipa').innerText = w.ipa;
    document.getElementById('c-def').innerText = w.def;
    document.getElementById('c-geo').innerText = w.geo;
}

function changeIdx(d) { idx = (idx+d+words.length)%words.length; updateView(); }

async function saveWithGemini() {
    const term = document.getElementById('in-term').value.trim();
    const cat = document.getElementById('in-cat').value.trim() || 'General';
    const status = document.getElementById('status');
    
    if(!term) return;

    status.innerText = "🤖 AI ფიქრობს...";
    status.className = "status-msg loading";

    try {
        const res = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ word: term, category: cat })
        });
        const data = await res.json();

        if(res.ok) {
            words.push({ term, ipa: data.ipa, def: data.definition, geo: data.georgian });
            localStorage.setItem('medvocab_v20', JSON.stringify(words));
            status.innerText = "✅ დაემატა!";
            status.className = "status-msg success";
            setTimeout(() => navigate('study'), 1000);
        } else { throw new Error(); }
    } catch(e) {
        status.innerText = "❌ შეცდომა";
        status.className = "status-msg error";
    }
}
updateView();
</script>
</body>
</html>
