<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>MedVocab-Pro v24.0</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #1d4ed8; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); max-width: 480px; margin: 0 auto; min-height: 100vh; }
        header { background: var(--blue); color: white; padding: 16px 20px; text-align: center; }
        .container { padding: 20px 16px 100px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card); border-radius: 20px; padding: 40px 20px; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px; min-height: 300px; display: flex; flex-direction: column; justify-content: center; }
        .btn-main { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--blue); color: white; font-weight: 700; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: white; border-top: 1px solid var(--border); display: flex; padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; font-size: 12px; color: #64748b; cursor: pointer; }
        .nav-item.active { color: var(--blue); font-weight: 700; }
    </style>
</head>
<body>

<header>
    <h1 style="font-family:'DM Serif Display'; font-size:22px;">MedVocab-Pro</h1>
</header>

<div class="container">
    <div id="page-study" class="page active">
        <div class="card" onclick="this.classList.toggle('flipped')">
            <h2 id="c-term" style="font-family:'DM Serif Display'; font-size:32px; color:var(--blue);">...</h2>
            <p id="c-geo" style="margin-top:20px; font-size:20px; color:#16a34a; font-weight:bold;"></p>
        </div>
        <button class="btn-main" onclick="changeIdx(1)">შემდეგი სიტყვა ➡️</button>
    </div>

    <div id="page-quiz" class="page">
        <div class="card" id="quiz-container"></div>
    </div>

    <div id="page-add" class="page">
        <div class="card">
            <h3 style="margin-bottom:15px;">AI დამატება</h3>
            <input type="text" id="in-term" placeholder="ტერმინი (ინგლისურად)" style="width:100%; padding:14px; border-radius:10px; border:1px solid var(--border); margin-bottom:15px;">
            <button class="btn-main" onclick="askAI()">🪄 გენერირება</button>
            <p id="status" style="margin-top:10px; font-size:14px;"></p>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="nav('study')">📚 სწავლა</div>
    <div class="nav-item" onclick="nav('quiz')">📝 ქვიზი</div>
    <div class="nav-item" onclick="nav('add')">✨ დამატება</div>
</nav>

<script>
    // ყველა ძველი ვერსიიდან მონაცემების შეგროვება
    let allData = JSON.parse(localStorage.getItem('medvocab_v24')) || 
                  JSON.parse(localStorage.getItem('medvocab_v22')) || 
                  JSON.parse(localStorage.getItem('medvocab_v21')) || 
                  JSON.parse(localStorage.getItem('medvocab_v20')) || [];
    
    let words = allData.length > 0 ? allData : [{term: "Diagnosis", geo: "დიაგნოზი"}];
    let idx = 0;

    function nav(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        event.currentTarget.classList.add('active');
        if(p === 'quiz') startQuiz();
    }

    function updateView() {
        document.getElementById('c-term').innerText = words[idx].term;
        document.getElementById('c-geo').innerText = words[idx].geo;
    }

    function changeIdx(d) { idx = (idx + d + words.length) % words.length; updateView(); }

    function startQuiz() {
        if(words.length < 2) { document.getElementById('quiz-container').innerHTML = "სავარჯიშოსთვის საჭიროა მინიმუმ 2 სიტყვა"; return; }
        let w = words[Math.floor(Math.random() * words.length)];
        document.getElementById('quiz-container').innerHTML = `<h3>რა არის "${w.term}"-ის თარგმანი?</h3><br><h2 style="color:var(--blue)">${w.geo}</h2>`;
    }

    async function askAI() {
        const term = document.getElementById('in-term').value;
        const status = document.getElementById('status');
        if(!term) return;
        status.innerText = "🤖 Gemini ფიქრობს...";
        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                body: JSON.stringify({ word: term })
            });
            const data = await res.json();
            words.push({ term: term, geo: data.georgian });
            localStorage.setItem('medvocab_v24', JSON.stringify(words));
            status.innerText = "✅ წარმატებით დაემატა!";
            updateView();
        } catch(e) {
            status.innerText = "❌ შეცდომა! შეამოწმეთ API Key Vercel-ზე.";
        }
    }

    updateView();
</script>
</body>
</html>
